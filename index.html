<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知源 KnowSource — 在线体验</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-void: #0a0e1a;
  --bg-deep: #111827;
  --bg-card: #1a2236;
  --bg-input: #0f1626;
  --glass-bg: rgba(26, 34, 54, 0.6);
  --glass-border: rgba(255, 255, 255, 0.08);
  --accent-cyan: #06b6d4;
  --accent-emerald: #10b981;
  --accent-violet: #8b5cf6;
  --accent-amber: #f59e0b;
  --accent-rose: #f43f5e;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --border-color: rgba(255, 255, 255, 0.06);
  --border-hover: rgba(255, 255, 255, 0.12);
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
  --gradient-cyan: linear-gradient(135deg, #06b6d4 0%, #0ea5e9 100%);
  --gradient-violet: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
  --gradient-emerald: linear-gradient(135deg, #10b981 0%, #059669 100%);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Noto Sans SC', sans-serif; background: var(--bg-void); color: var(--text-primary); font-size: 14px; }
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: radial-gradient(ellipse at 20% 10%, rgba(6,182,212,0.06) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 80%, rgba(139,92,246,0.05) 0%, transparent 50%);
}
#app, .app { display: flex; flex-direction: column; height: 100vh; position: relative; z-index: 1; }

/* ===== Top Bar ===== */
.topbar { display: flex; align-items: center; padding: 0 20px; height: 52px; background: var(--bg-deep); border-bottom: 1px solid var(--border-color); gap: 16px; flex-shrink: 0; }
.topbar__logo { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 16px; white-space: nowrap; }
.topbar__logo span { background: var(--gradient-cyan); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.topbar__badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: rgba(6,182,212,0.15); color: var(--accent-cyan); border: 1px solid rgba(6,182,212,0.2); font-weight: 500; }
.topbar__spacer { flex: 1; }
.topbar__btn { padding: 6px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-secondary); cursor: pointer; font-size: 13px; transition: all .2s; display: flex; align-items: center; gap: 6px; }
.topbar__btn:hover { border-color: var(--border-hover); color: var(--text-primary); }
.topbar__btn--active { background: rgba(6,182,212,0.12); border-color: rgba(6,182,212,0.3); color: var(--accent-cyan); }

/* ===== Main Layout ===== */
.main { display: flex; flex: 1; min-height: 0; }
.sidebar { width: 240px; min-width: 200px; background: var(--bg-deep); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar__header { padding: 14px 16px; border-bottom: 1px solid var(--border-color); }
.sidebar__header h3 { font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
.sidebar__list { flex: 1; overflow-y: auto; padding: 8px; }
.sidebar__item { padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer; transition: all .15s; margin-bottom: 2px; display: flex; align-items: center; gap: 8px; }
.sidebar__item:hover { background: rgba(255,255,255,0.04); }
.sidebar__item--active { background: rgba(6,182,212,0.1); color: var(--accent-cyan); }
.sidebar__item-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.sidebar__item-name { font-size: 13px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.content { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; }
.content__body { flex: 1; overflow-y: auto; padding: 20px; }

/* ===== Panels ===== */
.panel { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius); margin-bottom: 16px; }
.panel__header { padding: 14px 18px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; }
.panel__header h2 { font-size: 14px; font-weight: 600; }
.panel__body { padding: 18px; }

/* ===== Forms ===== */
textarea, input[type="text"], input[type="password"], select {
  width: 100%; background: var(--bg-input); border: 1px solid var(--border-color); border-radius: var(--radius-sm);
  color: var(--text-primary); padding: 10px 12px; font-size: 13px; font-family: inherit; transition: border .2s; resize: vertical;
}
textarea:focus, input:focus, select:focus { outline: none; border-color: var(--accent-cyan); }
textarea { font-family: 'JetBrains Mono', monospace; line-height: 1.6; }
label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; font-weight: 500; }
.field { margin-bottom: 14px; }
.field-row { display: flex; gap: 12px; }
.field-row .field { flex: 1; }

.btn { padding: 8px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-primary); cursor: pointer; font-size: 13px; font-family: inherit; transition: all .2s; display: inline-flex; align-items: center; gap: 6px; }
.btn:hover { border-color: var(--border-hover); }
.btn--primary { background: var(--gradient-cyan); border: none; color: #fff; font-weight: 500; }
.btn--primary:hover { opacity: 0.9; transform: translateY(-1px); }
.btn--danger { background: rgba(244,63,94,0.1); border-color: rgba(244,63,94,0.2); color: var(--accent-rose); }
.btn--sm { padding: 5px 10px; font-size: 12px; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ===== Tabs ===== */
.tabs { display: flex; gap: 2px; }
.tabs__tab { padding: 6px 14px; border-radius: var(--radius-sm) var(--radius-sm) 0 0; cursor: pointer; font-size: 13px; color: var(--text-secondary); border-bottom: 2px solid transparent; transition: all .15s; }
.tabs__tab:hover { color: var(--text-primary); }
.tabs__tab--active { color: var(--accent-cyan); border-bottom-color: var(--accent-cyan); }

/* ===== Prompt Lab ===== */
.promptlab { display: flex; gap: 16px; height: 100%; }
.promptlab__left { width: 260px; flex-shrink: 0; display: flex; flex-direction: column; gap: 12px; }
.task-filter { padding: 8px; }
.task-list { flex: 1; overflow-y: auto; }
.task-card { padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer; margin-bottom: 4px; border: 1px solid transparent; transition: all .15s; }
.task-card:hover { background: rgba(255,255,255,0.03); }
.task-card--active { background: rgba(6,182,212,0.08); border-color: rgba(6,182,212,0.2); }
.task-card__name { font-size: 13px; font-weight: 500; }
.task-card__cat { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.task-card__vars { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.task-card__var { font-size: 10px; padding: 1px 6px; border-radius: 8px; background: rgba(139,92,246,0.1); color: var(--accent-violet); font-family: 'JetBrains Mono', monospace; }

.promptlab__right { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }
.template-editor textarea { min-height: 120px; }
.test-section { }
.test-result { background: var(--bg-input); border: 1px solid var(--border-color); border-radius: var(--radius-sm); padding: 14px; margin-top: 12px; font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; max-height: 400px; overflow-y: auto; }
.test-result__label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; margin-top: 12px; font-family: 'Noto Sans SC', sans-serif; }
.test-result__label:first-child { margin-top: 0; }
.test-meta { display: flex; gap: 12px; font-size: 11px; color: var(--text-muted); margin-bottom: 12px; flex-wrap: wrap; }
.test-meta span { padding: 2px 8px; border-radius: 8px; background: rgba(255,255,255,0.04); }

/* ===== Model Config ===== */
.config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.config-status { padding: 10px 14px; border-radius: var(--radius-sm); font-size: 12px; margin-top: 12px; }
.config-status--ok { background: rgba(16,185,129,0.1); color: var(--accent-emerald); border: 1px solid rgba(16,185,129,0.2); }
.config-status--err { background: rgba(244,63,94,0.1); color: var(--accent-rose); border: 1px solid rgba(244,63,94,0.2); }
.config-status--warn { background: rgba(245,158,11,0.1); color: var(--accent-amber); border: 1px solid rgba(245,158,11,0.2); }

/* ===== Graph ===== */
.graph-container { position: relative; width: 100%; height: 500px; background: var(--bg-input); border: 1px solid var(--border-color); border-radius: var(--radius); overflow: hidden; }
.graph-svg { width: 100%; height: 100%; }
.graph-node { cursor: pointer; }
.graph-node circle { transition: r .2s; }
.graph-node:hover circle { r: 12; }
.graph-link { stroke: rgba(255,255,255,0.1); stroke-width: 1.5; transition: stroke .2s; }
.graph-link--highlight { stroke: var(--accent-cyan); stroke-width: 2.5; }
.graph-label { font-size: 11px; fill: var(--text-secondary); pointer-events: none; text-anchor: middle; }
.graph-controls { position: absolute; top: 12px; right: 12px; display: flex; flex-direction: column; gap: 6px; }
.graph-stats { position: absolute; bottom: 12px; left: 12px; font-size: 11px; color: var(--text-muted); background: rgba(0,0,0,0.4); padding: 6px 10px; border-radius: var(--radius-sm); }

/* ===== Doc Import ===== */
.doc-area { display: flex; gap: 16px; }
.doc-area__input { flex: 1; }
.doc-area__input textarea { min-height: 200px; }
.doc-area__preview { flex: 1; }

/* ===== Log ===== */
.log-entry { padding: 12px; border-radius: var(--radius-sm); background: var(--bg-input); margin-bottom: 8px; border: 1px solid var(--border-color); cursor: pointer; }
.log-entry__header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.log-entry__task { font-size: 12px; font-weight: 600; }
.log-entry__time { font-size: 11px; color: var(--text-muted); }
.log-entry__body { font-size: 11px; color: var(--text-secondary); white-space: pre-wrap; max-height: 200px; overflow-y: auto; font-family: 'JetBrains Mono', monospace; }
.log-entry__body--collapsed { max-height: 0; overflow: hidden; margin: 0; }
.log-badge { font-size: 10px; padding: 1px 6px; border-radius: 8px; margin-left: 6px; }
.log-badge--ok { background: rgba(16,185,129,0.15); color: var(--accent-emerald); }
.log-badge--err { background: rgba(244,63,94,0.15); color: var(--accent-rose); }

/* ===== Misc ===== */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.3; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.2); border-top-color: var(--accent-cyan); border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.fade-in { animation: fadeIn .3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
.divider { height: 1px; background: var(--border-color); margin: 16px 0; }
.hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
.tag { font-size: 10px; padding: 2px 8px; border-radius: 8px; font-weight: 500; display: inline-block; }
.tag--cyan { background: rgba(6,182,212,0.12); color: var(--accent-cyan); }
.tag--violet { background: rgba(139,92,246,0.12); color: var(--accent-violet); }
.tag--emerald { background: rgba(16,185,129,0.12); color: var(--accent-emerald); }
.tag--amber { background: rgba(245,158,11,0.12); color: var(--accent-amber); }
.tag--rose { background: rgba(244,63,94,0.12); color: var(--accent-rose); }
</style>
</head>
<body>
<script type="text/x-template" id="app-template">

  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar__logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7v10l10 5 10-5V7L12 2z" stroke="url(#g1)" stroke-width="2" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" fill="url(#g1)"/><defs><linearGradient id="g1" x1="0" y1="0" x2="24" y2="24"><stop stop-color="#06b6d4"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs></svg>
      <span>知源</span> KnowSource
      <div class="topbar__badge">在线体验</div>
    </div>
    <div class="topbar__spacer"></div>
    <button class="topbar__btn" :class="{ 'topbar__btn--active': activeView === 'promptlab' }" @click="activeView='promptlab'">提示词实验室</button>
    <button class="topbar__btn" :class="{ 'topbar__btn--active': activeView === 'graph' }" @click="activeView='graph'">知识图谱</button>
    <button class="topbar__btn" :class="{ 'topbar__btn--active': activeView === 'config' }" @click="activeView='config'">模型配置</button>
  </div>

  <!-- Main -->
  <div class="main">
    <!-- PromptLab View -->
    <div v-if="activeView==='promptlab'" class="promptlab" style="padding: 16px; width: 100%;">
      <!-- Left: Task List -->
      <div class="promptlab__left">
        <div class="panel" style="flex:1; display:flex; flex-direction:column; margin:0;">
          <div class="panel__header"><h2>LLM 任务列表</h2><span class="tag tag--cyan">{{ tasks.length }} 个</span></div>
          <div class="task-filter">
            <input type="text" v-model="taskFilter" placeholder="搜索任务..." style="font-size:12px;">
          </div>
          <div class="task-list" style="flex:1; overflow-y:auto; padding: 0 8px 8px;">
            <div v-for="task in filteredTasks" :key="task.id" class="task-card" :class="{ 'task-card--active': selectedTaskId===task.id }" @click="selectTask(task.id)">
              <div class="task-card__name">{{ task.name }}</div>
              <div class="task-card__cat">{{ task.category }} · {{ task.description }}</div>
              <div class="task-card__vars">
                <span v-for="v in task.variables" :key="v" class="task-card__var">{{ '{{' + v + '}}' }}</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Right: Template + Test -->
      <div class="promptlab__right">
        <div v-if="selectedTask" class="fade-in">
          <!-- Template Editor -->
          <div class="panel">
            <div class="panel__header">
              <h2>{{ selectedTask.name }} — 提示词模板</h2>
              <div style="display:flex; gap:8px;">
                <button class="btn btn--sm" @click="resetTemplate" v-if="hasOverride">恢复内置</button>
                <button class="btn btn--sm btn--primary" @click="saveTemplate" :disabled="!templateChanged">保存修改</button>
              </div>
            </div>
            <div class="panel__body template-editor">
              <div class="field" v-if="selectedTask.system !== undefined">
                <label>System 提示词 <span class="hint" style="display:inline;">{{ selectedTask.system ? '' : '(此任务无 system prompt)' }}</span></label>
                <textarea v-model="editSystem" :placeholder="selectedTask.system ? '' : '此任务没有 system prompt'" rows="6"></textarea>
              </div>
              <div class="field">
                <label>User 提示词</label>
                <textarea v-model="editUser" rows="8"></textarea>
              </div>
              <div class="hint">模板使用 <code style="background:rgba(139,92,246,0.1);padding:1px 4px;border-radius:3px;color:var(--accent-violet);">{{ '{{变量名}}' }}</code> 占位符，运行时自动替换为实际值</div>
            </div>
          </div>

          <!-- Test Section -->
          <div class="panel test-section">
            <div class="panel__header">
              <h2>模板测试</h2>
              <button class="btn btn--sm btn--primary" @click="runTest" :disabled="testing">
                <span v-if="testing" class="spinner"></span>
                {{ testing ? '测试中...' : '运行测试' }}
              </button>
            </div>
            <div class="panel__body">
              <div class="field">
                <label>测试变量（JSON 格式）</label>
                <textarea v-model="testVars" rows="4" placeholder='{"sample": "这是一段测试文本..."}' style="font-family:'JetBrains Mono',monospace;"></textarea>
                <div class="hint">可用变量：{{ selectedTask.variables.map(v => '{{'+v+'}}').join('、') }}</div>
              </div>
              <div v-if="testError" class="config-status config-status--err" style="margin-top:0;margin-bottom:12px;">{{ testError }}</div>
              <div v-if="testResult || testRenderedSystem || testRenderedUser" class="test-result">
                <div class="test-meta" v-if="testMeta">
                  <span>{{ testMeta.provider }}</span>
                  <span>{{ testMeta.model }}</span>
                  <span>{{ testMeta.durationMs }}ms</span>
                  <span :class="testMeta.success ? 'tag tag--emerald' : 'tag tag--rose'">{{ testMeta.success ? '成功' : '失败' }}</span>
                </div>
                <div v-if="testRenderedSystem" class="test-result__label">System（渲染后）</div>
                <div v-if="testRenderedSystem">{{ testRenderedSystem }}</div>
                <div v-if="testRenderedUser" class="test-result__label">User（渲染后，模板填入实际内容）</div>
                <div v-if="testRenderedUser">{{ testRenderedUser }}</div>
                <div v-if="testResult" class="test-result__label">LLM 响应</div>
                <div v-if="testResult">{{ testResult }}</div>
              </div>
            </div>
          </div>

          <!-- Call Logs -->
          <div class="panel">
            <div class="panel__header">
              <h2>调用日志</h2>
              <button class="btn btn--sm" @click="refreshLogs">刷新</button>
            </div>
            <div class="panel__body" style="max-height:400px;overflow-y:auto;">
              <div v-if="logs.length===0" class="empty-state" style="padding:30px;">
                <p style="font-size:12px;">暂无日志。运行测试后将在此显示调用记录。</p>
              </div>
              <div v-for="log in logs" :key="log.id" class="log-entry" @click="toggleLog(log.id)">
                <div class="log-entry__header">
                  <div>
                    <span class="log-entry__task">{{ log.taskName || log.taskId }}</span>
                    <span class="log-badge" :class="log.success ? 'log-badge--ok' : 'log-badge--err'">{{ log.success ? '成功' : '失败' }}</span>
                    <span v-if="log.overridden" class="tag tag--amber" style="margin-left:4px;">自定义</span>
                  </div>
                  <span class="log-entry__time">{{ formatTime(log.timestamp) }}</span>
                </div>
                <div class="log-entry__body" :class="{ 'log-entry__body--collapsed': expandedLogId !== log.id }">
                  <template v-if="log.system"><div style="color:var(--text-muted);margin-bottom:4px;">[System]</div>{{ log.system }}<div style="margin-top:8px;"></div></template>
                  <div style="color:var(--text-muted);margin-bottom:4px;">[User]</div>{{ log.user }}<div style="margin-top:8px;"></div>
                  <div style="color:var(--text-muted);margin-bottom:4px;">[Response]</div>{{ log.response }}
                </div>
              </div>
            </div>
          </div>
        </div>
        <div v-else class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
          <p>← 从左侧选择一个任务查看和编辑其提示词模板</p>
        </div>
      </div>
    </div>

    <!-- Graph View -->
    <div v-if="activeView==='graph'" class="content__body" style="width:100%;">
      <div class="panel">
        <div class="panel__header">
          <h2>知识图谱构建</h2>
          <div style="display:flex;gap:8px;">
            <button class="btn btn--sm" @click="activeView='graph'; loadSampleDoc()">加载示例文本</button>
            <button class="btn btn--sm btn--primary" @click="buildGraph" :disabled="graphBuilding">
              <span v-if="graphBuilding" class="spinner"></span>
              {{ graphBuilding ? '构建中...' : '构建图谱' }}
            </button>
          </div>
        </div>
        <div class="panel__body">
          <div class="field">
            <label>文档文本（粘贴或输入，建议 500-5000 字）</label>
            <textarea v-model="docText" rows="6" placeholder="在此粘贴文档内容，或点击「加载示例文本」..." style="font-family:inherit;"></textarea>
          </div>
          <div v-if="graphBuildError" class="config-status config-status--err" style="margin-top:0;">{{ graphBuildError }}</div>
          <div v-if="graphBuildProgress" class="config-status config-status--warn" style="margin-top:0;">{{ graphBuildProgress }}</div>
        </div>
      </div>

      <div class="panel" v-if="graphData.nodes.length > 0">
        <div class="panel__header">
          <h2>图谱可视化</h2>
          <span class="tag tag--cyan">{{ graphData.nodes.length }} 节点 · {{ graphData.edges.length }} 边</span>
        </div>
        <div class="panel__body">
          <div class="graph-container" id="graphContainer">
            <svg class="graph-svg" id="graphSvg"></svg>
            <div class="graph-controls">
              <button class="btn btn--sm" @click="zoomGraph(1.2)">+</button>
              <button class="btn btn--sm" @click="zoomGraph(0.8)">-</button>
            </div>
            <div class="graph-stats">拖拽节点 · 滚轮缩放 · 点击高亮</div>
          </div>

      localStorage.setItem('ks_provider', modelConfig.value.provider);
      localStorage.setItem('ks_model', modelConfig.value.model);
      localStorage.setItem('ks_apiKey', modelConfig.value.apiKey);
      localStorage.setItem('ks_baseUrl', modelConfig.value.baseUrl);
      modelTestResult.value = { success: true, message: '配置已保存', response: '' };
    }

    async function testModel() {
      modelTesting.value = true;
      modelTestResult.value = null;
      try {
        const provider = createLLMProvider(modelConfig.value);
        const response = await provider.complete('你好，请回复"连接成功"四个字。', { temperature: 0.1, maxTokens: 20 });
        modelTestResult.value = { success: true, message: '', response: response.slice(0, 100) };
      } catch (e) {
        modelTestResult.value = { success: false, message: e.message || String(e), response: '' };
      } finally {
        modelTesting.value = false;
      }
    }

    // --- LLM Provider Factory ---
    function createLLMProvider(cfg) {
      if (cfg.provider === 'stub') {
        return {
          name: 'stub',
          model: 'stub',
          config: { provider: 'stub', model: '' },
          capabilities: { qualityLevel: 'none' },
          async complete(prompt, options = {}) {
            // 智能模拟：根据 prompt 内容返回合理的 JSON
            await new Promise(r => setTimeout(r, 300 + Math.random() * 500));
            return generateStubResponse(prompt, options);
          }
        };
      }
      const baseUrl = (cfg.baseUrl || VENDOR_PRESETS[cfg.provider]?.baseUrl || '').replace(/\/+$/, '');
      return {
        name: 'openai-compatible',
        model: cfg.model,
        config: { provider: cfg.provider, model: cfg.model, baseUrl },
        capabilities: { qualityLevel: 'strong' },
        async complete(prompt, options = {}) {
          const controller = new AbortController();
          const timer = setTimeout(() => controller.abort(), options.timeoutMs || 60000);
          try {
            const messages = [];
            if (options.system) messages.push({ role: 'system', content: options.system });
            messages.push({ role: 'user', content: prompt });
            const body = {
              model: cfg.model,
              messages,
              temperature: options.temperature ?? 0.7,
              max_tokens: options.maxTokens || 4096
            };
            const resp = await fetch(`${baseUrl}/chat/completions`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${cfg.apiKey}` },
              signal: controller.signal,
              body: JSON.stringify(body)
            });
            if (!resp.ok) {
              const errText = await resp.text().catch(() => '');
              const err = new Error(`API ${resp.status}: ${errText.slice(0, 200)}`);
              err.status = resp.status;
              throw err;
            }
            const data = await resp.json();
            return data.choices[0].message.content;
          } finally { clearTimeout(timer); }
        }
      };
    }

    // --- Stub Response Generator ---
    function generateStubResponse(prompt, options) {
      const lower = prompt.toLowerCase();
      // 检测 JSON 输出需求
      if (prompt.includes('JSON') || prompt.includes('json') || prompt.includes('json')) {
        if (prompt.includes('docType')) {
          return JSON.stringify({ docType: 'textbook', domain: '数学', specialElements: ['公式', '例题'] });
        }
        if (prompt.includes('entities') || prompt.includes('headings') || prompt.includes('relationships')) {
          return JSON.stringify({
            headings: [{ title: '第一章 函数与极限', level: 1, start: 0 }, { title: '1.1 函数的概念', level: 2, start: 20 }],
            entities: [
              { term: '函数', specificity: 3, isGeneric: true, start: 30, type: 'concept' },
              { term: '极限', specificity: 6, isGeneric: false, start: 100, type: 'concept' },
              { term: '连续性', specificity: 7, isGeneric: false, start: 200, type: 'concept' },
              { term: '导数', specificity: 7, isGeneric: false, start: 300, type: 'concept' }
            ],
            relationships: [
              { from: '极限', to: '连续性', type: 'related', weight: 0.9 },
              { from: '连续性', to: '导数', type: 'related', weight: 0.8 },
              { from: '函数', to: '极限', type: 'related', weight: 0.7 }
            ]
          });
        }
        if (prompt.includes('"term"') && prompt.includes('"type"')) {
          return JSON.stringify({ domain: '数学', terms: [{ term: '极限', type: '概念', importance: '高' }, { term: '连续性', type: '概念', importance: '高' }, { term: '导数', type: '概念', importance: '高' }] });
        }
        if (prompt.includes('"terms"')) {
          return JSON.stringify({ domain: '数学', terms: ['极限', '连续性', '导数', '微分', '积分'] });
        }
        if (prompt.includes('["') || prompt.includes('术语')) {
          return JSON.stringify(['极限', '连续性', '导数', '微分', '积分']);
        }
        if (prompt.includes('isExamPaper')) {
          return JSON.stringify({ isExamPaper: false, confidence: 0.9, reason: '主体是知识点讲解，为教材/讲义' });
        }
        if (prompt.includes('specificity')) {
          return JSON.stringify([{ term: '极限', specificity: 7, isGeneric: false }, { term: '函数', specificity: 2, isGeneric: true }]);
        }
        return JSON.stringify({ result: '[stub] 离线模式模拟响应', note: '配置云端模型以获得真实 LLM 响应' });
      }
      return `[stub-llm] 离线模式响应。配置云端模型后可获得真实 LLM 回复。\n\n输入摘要：${prompt.slice(0, 80)}...`;
    }

    // --- PromptLab ---
    const tasks = ref(TASKS.map(t => ({ ...t, system: TEMPLATES[t.id]?.system || '', user: TEMPLATES[t.id]?.user || '' })));
    const taskFilter = ref('');
    const selectedTaskId = ref('');
    const editSystem = ref('');
    const editUser = ref('');
    const templateChanged = ref(false);
    const userOverrides = ref(JSON.parse(localStorage.getItem('ks_overrides') || '{}'));
    const testVars = ref('{}');
    const testResult = ref('');
    const testRenderedSystem = ref('');
    const testRenderedUser = ref('');
    const testError = ref('');
    const testing = ref(false);
    const testMeta = ref(null);
    const logs = ref(JSON.parse(localStorage.getItem('ks_logs') || '[]'));
    const expandedLogId = ref(null);

    const filteredTasks = computed(() => {
      if (!taskFilter.value) return tasks.value;
      const kw = taskFilter.value.toLowerCase();
      return tasks.value.filter(t => t.name.toLowerCase().includes(kw) || t.description.toLowerCase().includes(kw) || t.category.toLowerCase().includes(kw));
    });

    const selectedTask = computed(() => tasks.value.find(t => t.id === selectedTaskId.value) || null);
    const hasOverride = computed(() => userOverrides.value[selectedTaskId.value] !== undefined);

    function selectTask(taskId) {
      selectedTaskId.value = taskId;
      loadTaskTemplate(taskId);
    }

    function loadTaskTemplate(taskId) {
      const override = userOverrides.value[taskId];
      const builtin = TEMPLATES[taskId] || { system: '', user: '' };
      if (override) {
        editSystem.value = override.system != null ? override.system : (builtin.system || '');
        editUser.value = override.user != null ? override.user : (builtin.user || '');
      } else {
        editSystem.value = builtin.system || '';
        editUser.value = builtin.user || '';
      }
      templateChanged.value = false;
      testResult.value = '';
      testRenderedSystem.value = '';
      testRenderedUser.value = '';
      testError.value = '';
      testMeta.value = null;
    }

    watch([editSystem, editUser], () => { templateChanged.value = true; });

    function saveTemplate() {
      userOverrides.value[selectedTaskId.value] = { system: editSystem.value, user: editUser.value };
      localStorage.setItem('ks_overrides', JSON.stringify(userOverrides.value));
      templateChanged.value = false;
    }

    function resetTemplate() {
      delete userOverrides.value[selectedTaskId.value];
      localStorage.setItem('ks_overrides', JSON.stringify(userOverrides.value));
      loadTaskTemplate(selectedTaskId.value);
    }

    function renderTemplate(template, vars = {}) {
      if (typeof template !== 'string') return template;
      return template.replace(/\{\{\s*(\w+)\s*\}\}/g, (match, name) => {
        const val = vars[name];
        if (val === undefined || val === null) return match;
        return String(val);
      });
    }

    async function runTest() {
      testing.value = true;
      testError.value = '';
      testResult.value = '';
      testRenderedSystem.value = '';
      testRenderedUser.value = '';
      testMeta.value = null;

      let vars = {};
      try {
        vars = JSON.parse(testVars.value);
      } catch (e) {
        testError.value = '变量 JSON 解析失败：' + e.message;
        testing.value = false;
        return;
      }

      const taskId = selectedTaskId.value;
      const task = selectedTask.value;
      const override = userOverrides.value[taskId];
      const builtin = TEMPLATES[taskId] || { system: '', user: '' };
      const effectiveSystem = override?.system != null ? override.system : builtin.system;
      const effectiveUser = override?.user != null ? override.user : builtin.user;

      const renderedSystem = renderTemplate(effectiveSystem, vars);
      const renderedUser = renderTemplate(effectiveUser, vars);
      testRenderedSystem.value = renderedSystem;
      testRenderedUser.value = renderedUser;

      const startTime = Date.now();
      try {
        const provider = createLLMProvider(modelConfig.value);
        const response = await provider.complete(renderedUser, {
          system: renderedSystem || undefined,
          temperature: 0.7,
          maxTokens: 2000
        });
        const durationMs = Date.now() - startTime;
        testResult.value = response;
        testMeta.value = {
          provider: provider.config.provider,
          model: provider.config.model || 'stub',
          durationMs,
          success: true
        };

        // 记录日志
        const logEntry = {
          id: Date.now(),
          taskId,
          taskName: task?.name,
          system: renderedSystem,
          user: renderedUser,
          response,
          durationMs,
          success: true,
          overridden: !!override,
          timestamp: new Date().toISOString()
        };
        logs.value.unshift(logEntry);
        if (logs.value.length > 50) logs.value = logs.value.slice(0, 50);
        localStorage.setItem('ks_logs', JSON.stringify(logs.value));
      } catch (e) {
        const durationMs = Date.now() - startTime;
        testResult.value = '';
        testError.value = e.message || String(e);
        testMeta.value = {
          provider: modelConfig.value.provider,
          model: modelConfig.value.model || 'stub',
          durationMs,
          success: false
        };
        const logEntry = {
          id: Date.now(),
          taskId,
          taskName: task?.name,
          system: renderedSystem,
          user: renderedUser,
          response: e.message || String(e),
          durationMs,
          success: false,
          overridden: !!override,
          timestamp: new Date().toISOString()
        };
        logs.value.unshift(logEntry);
        if (logs.value.length > 50) logs.value = logs.value.slice(0, 50);
        localStorage.setItem('ks_logs', JSON.stringify(logs.value));
      } finally {
        testing.value = false;
      }
    }

    function refreshLogs() {
      logs.value = JSON.parse(localStorage.getItem('ks_logs') || '[]');
    }

    function toggleLog(id) {
      expandedLogId.value = expandedLogId.value === id ? null : id;
    }

    function formatTime(ts) {
      try {
        const d = new Date(ts);
        return d.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });
      } catch { return ts; }
    }

    // --- Graph ---
    const docText = ref('');
    const graphData = ref({ nodes: [], edges: [] });
    const graphBuilding = ref(false);
    const graphBuildError = ref('');
    const graphBuildProgress = ref('');

    function loadSampleDoc() {
      docText.value = `第一章 函数与极限

1.1 函数的概念与性质

函数是高等数学中最基本的概念之一。设 x 和 y 是两个变量，D 是一个给定的数集。如果对于每个数 x∈D，变量 y 按照一定法则总有确定的数值和它对应，则称 y 是 x 的函数。

函数的几种特性：有界性、单调性、奇偶性、周期性。

1.2 极限

极限是微积分的理论基础。数列极限的定义：设 {an} 为一数列，如果存在常数 a，对于任意给定的正数 ε，总存在正整数 N，使得当 n>N 时，一切 an 都满足 |an - a| < ε，则称 a 是数列 {an} 的极限。

函数极限类似定义。极限存在的充分必要条件是左极限和右极限均存在且相等。

1.3 函数的连续性

设函数 y=f(x) 在点 x0 的某一邻域内有定义。如果 lim(x→x0) f(x) = f(x0)，则称函数 f(x) 在点 x0 连续。

如果函数在点 x0 不连续，则称 x0 为函数的间断点。间断点分为第一类间断点和第二类间断点。

1.4 导数与微分

导数是函数变化率的精确描述。设函数 y=f(x) 在点 x0 的某邻域内有定义，当自变量 x 在 x0 处取得增量 Δx 时，函数取得增量 Δy=f(x0+Δx)-f(x0)。如果 Δy/Δx 当 Δx→0 时的极限存在，则称该极限为函数 f(x) 在点 x0 处的导数。

微分是导数的线性近似部分。dy = f'(x)dx 称为函数的微分。

1.5 中值定理

罗尔定理：如果函数 f(x) 在闭区间 [a,b] 上连续，在开区间 (a,b) 内可导，且 f(a)=f(b)，则在 (a,b) 内至少存在一点 ξ，使得 f'(ξ)=0。

拉格朗日中值定理：如果函数 f(x) 在 [a,b] 上连续，在 (a,b) 内可导，则在 (a,b) 内至少存在一点 ξ，使得 f'(ξ) = [f(b)-f(a)]/(b-a)。

柯西中值定理是拉格朗日中值定理的推广。`;
    }

    async function buildGraph() {
      if (!docText.value.trim()) {
        graphBuildError.value = '请先输入文档文本';
        return;
      }
      graphBuilding.value = true;
      graphBuildError.value = '';
      graphBuildProgress.value = '正在调用 LLM 提取知识图谱...';

      try {
        const text = docText.value;
        const provider = createLLMProvider(modelConfig.value);
        const systemPrompt = renderTemplate(TEMPLATES['full-graph-extract'].system, {
          maxTerms: '30', maxHeadings: '15', threshold: '5'
        });
        const userPrompt = renderTemplate(TEMPLATES['full-graph-extract'].user, {
          textLength: String(text.length),
          markedText: text
        });

        graphBuildProgress.value = 'LLM 分析中（可能需要 10-30 秒）...';
        const response = await provider.complete(userPrompt, {
          system: systemPrompt,
          temperature: 0.3,
          maxTokens: 4000,
          timeoutMs: 120000
        });

        // 解析 JSON 响应
        let parsed;
        try {
          // 尝试从响应中提取 JSON
          const jsonMatch = response.match(/\{[\s\S]*\}/);
          parsed = JSON.parse(jsonMatch ? jsonMatch[0] : response);
        } catch (e) {
          // Stub 模式或解析失败，使用模拟数据
          graphBuildProgress.value = 'JSON 解析失败，使用模拟数据演示';
          parsed = generateStubResponse(userPrompt, {}).length > 0
            ? JSON.parse(generateStubResponse(userPrompt, {}))
            : { headings: [], entities: [], relationships: [] };
        }

        // 构建图谱数据
        const colors = ['6,182,212', '139,92,246', '16,185,129', '245,158,11', '244,63,94', '99,102,241'];
        const nodes = (parsed.entities || []).map((e, i) => ({
          id: e.term,
          label: e.term,
          type: e.type || 'concept',
          specificity: e.specificity || 5,
          colorRgb: colors[i % colors.length]
        }));
        const edges = (parsed.relationships || []).map(r => ({
          source: r.from,
          target: r.to,
          weight: r.weight || 0.5
        })).filter(e => nodes.some(n => n.id === e.source) && nodes.some(n => n.id === e.target));

        graphData.value = { nodes, edges };
        graphBuildProgress.value = '';

        // 渲染图谱
        await nextTick();
        renderGraph();
      } catch (e) {
        graphBuildError.value = e.message || String(e);
        graphBuildProgress.value = '';
      } finally {
        graphBuilding.value = false;
      }
    }

    function renderGraph() {
      const container = document.getElementById('graphContainer');
      if (!container) return;
      const width = container.clientWidth;
      const height = container.clientHeight;
      const svg = d3.select('#graphSvg');
      svg.selectAll('*').remove();

      if (graphData.value.nodes.length === 0) return;

      const g = svg.append('g');
      const zoom = d3.zoom().scaleExtent([0.2, 4]).on('zoom', (e) => g.attr('transform', e.transform));
      svg.call(zoom);

      const simulation = d3.forceSimulation(graphData.value.nodes)
        .force('link', d3.forceLink(graphData.value.edges).id(d => d.id).distance(d => 100 / (d.weight || 0.5)).strength(0.3))
        .force('charge', d3.forceManyBody().strength(-300))
        .force('center', d3.forceCenter(width / 2, height / 2))
        .force('collision', d3.forceCollide().radius(35));

      const link = g.append('g').selectAll('line').data(graphData.value.edges).enter().append('line')
        .attr('class', 'graph-link').attr('stroke-width', d => Math.max(1, d.weight * 3));

      const node = g.append('g').selectAll('g').data(graphData.value.nodes).enter().append('g')
        .attr('class', 'graph-node').call(d3.drag()
          .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
          .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
          .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));

      node.append('circle').attr('r', d => 6 + (d.specificity || 5) * 0.8)
        .attr('fill', d => `rgb(${d.colorRgb})`).attr('opacity', 0.8)
        .attr('stroke', d => `rgb(${d.colorRgb})`).attr('stroke-width', 2);

      node.append('text').attr('class', 'graph-label').attr('dy', d => -12 - (d.specificity || 5) * 0.4)
        .text(d => d.label);

      // 高亮交互
      node.on('mouseover', (e, d) => {
        link.attr('stroke', l => (l.source.id === d.id || l.target.id === d.id) ? 'var(--accent-cyan)' : 'rgba(255,255,255,0.1)')
            .attr('stroke-width', l => (l.source.id === d.id || l.target.id === d.id) ? 2.5 : 1.5);
      }).on('mouseout', () => {
        link.attr('stroke', 'rgba(255,255,255,0.1)').attr('stroke-width', d => Math.max(1, d.weight * 3));
      });

      simulation.on('tick', () => {
        link.attr('x1', d => d.source.x).attr('y1', d => d.source.y).attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        node.attr('transform', d => `translate(${d.x},${d.y})`);
      });
    }

    function zoomGraph(scale) {
      const svg = d3.select('#graphSvg');
      svg.transition().duration(300).call(d3.zoom().scaleBy, scale);
    }

    // --- Init ---
    onMounted(() => {
      // 初始化模型配置
      if (!modelConfig.value.baseUrl && modelConfig.value.provider !== 'stub') {
        onProviderChange();
      }
      // 自动选第一个任务
      if (tasks.value.length > 0) {
        selectTask(tasks.value[0].id);
      }
    });

    return {
      activeView, tasks, taskFilter, filteredTasks, selectedTaskId, selectedTask,
      editSystem, editUser, templateChanged, hasOverride,
      selectTask, saveTemplate, resetTemplate,
      testVars, testResult, testRenderedSystem, testRenderedUser, testError, testing, testMeta,
      runTest, logs, refreshLogs, toggleLog, expandedLogId, formatTime,
      modelConfig, modelTesting, modelTestResult, currentModels, modelPlaceholder, baseUrlPlaceholder,
      onProviderChange, testModel, saveModelConfig,
      docText, graphData, graphBuilding, graphBuildError, graphBuildProgress,
      loadSampleDoc, buildGraph, zoomGraph
    };
  }
}).mount('#app');
</script>
</body>
