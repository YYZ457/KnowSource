<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知源 · KnowSource — 面向科研人员的文献阅读与知识管理工具</title>
<style>
  :root {
    --bg-void: #0d1220;
    --bg-deep: #131a2e;
    --glass-bg: rgba(20, 28, 50, 0.5);
    --glass-border: rgba(255, 255, 255, 0.12);
    --accent-cyan: #00eaff;
    --accent-gold: #ffb84d;
    --accent-violet: #a855f7;
    --accent-rose: #f472b6;
    --accent-emerald: #34d399;
    --text-primary: #f0f4ff;
    --text-secondary: #a8b3cf;
    --text-muted: #7a85a8;
    --gradient-1: linear-gradient(135deg, #00eaff 0%, #a855f7 50%, #ffb84d 100%);
    --gradient-2: linear-gradient(135deg, #00eaff 0%, #34d399 100%);
    --gradient-3: linear-gradient(135deg, #a855f7 0%, #f472b6 100%);
    --gradient-4: linear-gradient(135deg, #ffb84d 0%, #f472b6 100%);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg-void);
    color: var(--text-primary);
    cursor: default;
  }

  body.dragging { cursor: grabbing; }

  /* 高级渐变背景 — 多层叠加 */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: 
      radial-gradient(ellipse at 20% 30%, rgba(0, 234, 255, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(168, 85, 247, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(255, 184, 77, 0.04) 0%, transparent 60%),
      linear-gradient(135deg, #0d1220 0%, #131a2e 40%, #1a1530 70%, #0f1626 100%);
    z-index: 0;
    pointer-events: none;
  }

  /* 渐变光球背景 — 增强亮度和色彩 */
  .gradient-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.25;
    z-index: 0;
    pointer-events: none;
    animation: orbFloat 25s ease-in-out infinite;
  }
  .orb-1 { width: 700px; height: 700px; background: var(--accent-cyan); top: -200px; left: -200px; }
  .orb-2 { width: 600px; height: 600px; background: var(--accent-violet); bottom: -150px; right: -150px; animation-delay: -8s; }
  .orb-3 { width: 500px; height: 500px; background: var(--accent-gold); top: 40%; left: 50%; animation-delay: -15s; opacity: 0.15; }

  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(80px, -50px) scale(1.1); }
    66% { transform: translate(-50px, 60px) scale(0.95); }
  }

  /* 噪点纹理 */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E");
    opacity: 0.025;
    z-index: 1;
    pointer-events: none;
    mix-blend-mode: overlay;
  }

  /* 粒子背景 */
  #particle-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
    opacity: 0.5;
  }

  /* 渐变光球 — fixed背景 */
  .gradient-orb {
    position: fixed;
  }

  /* ============ 第一页 — 项目大标题 ============ */
  .hero-cover {
    position: relative;
    width: 100%;
    height: 100vh;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .cover-title {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(100px, 18vw, 280px);
    font-weight: 900;
    letter-spacing: 12px;
    line-height: 1;
    background: linear-gradient(135deg, #00eaff 0%, #a855f7 35%, #ffb84d 65%, #f472b6 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 50px rgba(0, 234, 255, 0.4)) drop-shadow(0 0 100px rgba(168, 85, 247, 0.3));
    animation: coverBreath 5s ease-in-out infinite;
    text-align: center;
  }

  @keyframes coverBreath {
    0%, 100% { filter: drop-shadow(0 0 50px rgba(0,234,255,0.4)) drop-shadow(0 0 100px rgba(168,85,247,0.3)); }
    50% { filter: drop-shadow(0 0 70px rgba(0,234,255,0.55)) drop-shadow(0 0 130px rgba(168,85,247,0.4)); }
  }

  .cover-subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(18px, 2.5vw, 32px);
    letter-spacing: 10px;
    color: var(--text-secondary);
    margin-top: 20px;
    text-transform: uppercase;
    opacity: 0.8;
  }

  .cover-tagline {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: clamp(15px, 1.8vw, 22px);
    color: var(--text-muted);
    margin-top: 40px;
    max-width: 600px;
    text-align: center;
    line-height: 1.8;
    letter-spacing: 1px;
  }

  .cover-badge {
    position: absolute;
    top: 40px; left: 50%;
    transform: translateX(-50%);
    padding: 10px 24px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 100px;
    font-size: 13px;
    color: var(--text-secondary);
    letter-spacing: 2px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  .cover-scroll {
    position: absolute;
    bottom: 40px; left: 50%;
    transform: translateX(-50%);
    color: var(--text-muted);
    font-size: 13px;
    letter-spacing: 3px;
    animation: scrollBounce 2s ease-in-out infinite;
  }

  /* ============ 图谱画布 — 首屏hero ============ */
  #graph-container {
    position: relative;
    width: 100%;
    height: 100vh;
    z-index: 2;
    overflow: hidden;
    cursor: grab;
  }

  #graph-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  #graph-world {
    position: absolute;
    top: 50%; left: 50%;
    width: 0; height: 0;
    transform-origin: 0 0;
    will-change: transform;
    z-index: 5;
  }

  /* ============ 节点 — 去掉所有CSS transition，由JS物理引擎驱动 ============ */
  .graph-node {
    position: absolute;
    cursor: pointer;
    pointer-events: auto;
    user-select: none;
    will-change: transform, opacity;
    opacity: 0;
  }

  .node-core {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    backdrop-filter: blur(12px) saturate(1.3);
    -webkit-backdrop-filter: blur(12px) saturate(1.3);
    border: 2px solid var(--glass-border);
    text-align: center;
    will-change: transform, box-shadow;
  }

  .node-core::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    padding: 2px;
    background: var(--node-gradient, var(--gradient-1));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .node-label {
    font-family: 'Noto Serif SC', serif;
    font-weight: 700;
    color: var(--text-primary);
    white-space: nowrap;
    line-height: 1.1;
  }

  .node-sublabel {
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    margin-top: 4px;
    text-transform: uppercase;
    opacity: 0.6;
  }

  /* 中心节点 — 大号衬线字体 + 高亮发光 + 不透明 */
  .graph-node.center .node-core {
    width: 170px; height: 170px;
    background: linear-gradient(135deg, rgba(13, 18, 32, 0.92), rgba(26, 37, 64, 0.92));
    border-width: 2px;
    box-shadow: 
      0 0 60px rgba(0, 234, 255, 0.3),
      0 0 120px rgba(168, 85, 247, 0.15),
      inset 0 0 40px rgba(0, 234, 255, 0.08);
  }
  .graph-node.center .node-label { 
    font-size: 38px; 
    letter-spacing: 4px;
    background: linear-gradient(135deg, #00eaff 0%, #a855f7 50%, #ffb84d 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 20px rgba(0, 234, 255, 0.5));
  }
  .graph-node.center .node-sublabel { font-size: 10px; }

  /* 主分支节点 */
  .graph-node.branch .node-core {
    width: 120px; height: 120px;
    background: linear-gradient(135deg, rgba(13, 18, 32, 0.88), rgba(26, 37, 64, 0.88));
  }
  .graph-node.branch .node-label { font-size: 20px; letter-spacing: 2px; }
  .graph-node.branch .node-sublabel { font-size: 9px; }

  /* 装饰小节点 — 大小不一的空心小圈 */
  .graph-node.deco .node-core {
    width: var(--deco-size, 6px);
    height: var(--deco-size, 6px);
    background: transparent;
    border: 1px solid var(--node-color, var(--accent-cyan));
    box-shadow: 0 0 8px var(--node-color, var(--accent-cyan));
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
  }
  .graph-node.deco .node-label,
  .graph-node.deco .node-sublabel { display: none; }
  .graph-node.deco .node-pulse { display: none; }

  /* 节点脉冲环 — 多层叠加更柔和 */
  .node-pulse {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    border: 1.5px solid var(--node-color, var(--accent-cyan));
    opacity: 0;
    animation: nodePulse 4s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
    pointer-events: none;
  }

  .node-pulse:nth-child(2) { animation-delay: -1.3s; }
  .node-pulse:nth-child(3) { animation-delay: -2.6s; }

  @keyframes nodePulse {
    0% { transform: scale(0.95); opacity: 0.35; }
    100% { transform: scale(1.6); opacity: 0; }
  }

  /* ============ 内容面板 ============ */
  #content-panel {
    position: fixed;
    top: 0; right: 0;
    width: 480px;
    height: 100%;
    z-index: 10;
    transform: translateX(100%);
    pointer-events: none;
    will-change: transform;
  }

  #content-panel.open {
    pointer-events: auto;
  }

  .panel-inner {
    height: 100%;
    background: rgba(8, 12, 24, 0.88);
    backdrop-filter: blur(40px) saturate(1.5);
    -webkit-backdrop-filter: blur(40px) saturate(1.5);
    border-left: 1px solid var(--glass-border);
    overflow-y: auto;
    padding: 40px 36px;
    position: relative;
  }

  .panel-inner::-webkit-scrollbar { width: 4px; }
  .panel-inner::-webkit-scrollbar-track { background: transparent; }
  .panel-inner::-webkit-scrollbar-thumb { background: rgba(0,234,255,0.2); border-radius: 2px; }

  .panel-close {
    position: absolute;
    top: 24px; right: 24px;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--glass-border);
    color: var(--text-secondary);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 5;
  }

  .panel-close:hover {
    background: rgba(255,255,255,0.1);
    color: var(--text-primary);
    transform: rotate(90deg) scale(1.1);
  }

  .panel-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0;
    transform: translateY(12px);
  }

  .panel-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 8px;
    line-height: 1.2;
    opacity: 0;
    transform: translateY(16px);
  }

  .panel-title .gradient {
    background: var(--gradient-1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .panel-desc {
    color: var(--text-secondary);
    font-size: 15px;
    line-height: 1.8;
    margin-bottom: 28px;
    opacity: 0;
    transform: translateY(12px);
  }

  .panel-content { margin-top: 8px; }

  .content-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 24px 20px;
    margin-bottom: 16px;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    opacity: 0;
    transform: translateX(24px);
  }

  .content-item.visible {
    opacity: 1;
    transform: translateX(0);
  }

  .content-item:hover {
    background: rgba(255,255,255,0.05);
    border-color: rgba(0,234,255,0.2);
    transform: translateX(-6px) !important;
  }

  .content-item h4 {
    font-family: 'Noto Serif SC', serif;
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .content-item h4 .item-icon { font-size: 20px; }

  .content-item p {
    color: var(--text-secondary);
    font-size: 14px;
    line-height: 1.7;
  }

  .content-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }

  .content-tag {
    padding: 4px 12px;
    background: rgba(0, 234, 255, 0.06);
    border: 1px solid rgba(0, 234, 255, 0.15);
    border-radius: 100px;
    font-size: 11px;
    color: var(--accent-cyan);
  }

  .content-timeline-item {
    position: relative;
    padding-left: 28px;
    padding-bottom: 24px;
    border-left: 2px solid var(--glass-border);
    opacity: 0;
    transform: translateX(24px);
  }

  .content-timeline-item.visible {
    opacity: 1;
    transform: translateX(0);
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .content-timeline-item:last-child { border-left-color: transparent; padding-bottom: 0; }

  .content-timeline-item::before {
    content: '';
    position: absolute;
    left: -7px; top: 2px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--bg-void);
    border: 2px solid var(--accent-cyan);
    box-shadow: 0 0 10px var(--accent-cyan);
  }

  .content-timeline-item .step-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent-gold);
    margin-bottom: 6px;
  }

  .content-timeline-item h4 {
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    margin-bottom: 6px;
  }

  .content-timeline-item p {
    color: var(--text-secondary);
    font-size: 13px;
    line-height: 1.7;
  }

  .tech-row {
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 16px;
    padding: 16px 0;
    border-bottom: 1px solid var(--glass-border);
    opacity: 0;
    transform: translateX(24px);
  }

  .tech-row.visible {
    opacity: 1;
    transform: translateX(0);
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .tech-row:last-child { border-bottom: none; }

  .tech-row-name {
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .tech-row-name .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .tech-row-content {
    color: var(--text-secondary);
    font-size: 13px;
    line-height: 1.8;
  }

  .tech-row-content strong {
    color: var(--text-primary);
    font-weight: 500;
  }

  .roadmap-item {
    display: flex;
    gap: 16px;
    padding: 14px 0;
    border-bottom: 1px solid var(--glass-border);
    opacity: 0;
    transform: translateX(24px);
  }

  .roadmap-item.visible {
    opacity: 1;
    transform: translateX(0);
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .roadmap-item:last-child { border-bottom: none; }

  .roadmap-phase {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent-gold);
    min-width: 50px;
  }

  .roadmap-desc {
    color: var(--text-secondary);
    font-size: 13px;
  }

  .roadmap-desc strong { color: var(--text-primary); }

  /* ============ 顶部HUD ============ */
  .hud-top {
    position: absolute;
    top: 24px; left: 24px;
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 16px;
    pointer-events: none;
  }

  .hud-badge {
    padding: 8px 16px;
    background: rgba(0, 234, 255, 0.06);
    border: 1px solid rgba(0, 234, 255, 0.2);
    border-radius: 100px;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--accent-cyan);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  .hud-hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  /* ============ 底部HUD ============ */
  .hud-bottom {
    position: absolute;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    display: flex;
    gap: 12px;
    pointer-events: auto;
  }

  .hud-btn {
    padding: 10px 20px;
    background: rgba(15, 22, 40, 0.6);
    border: 1px solid var(--glass-border);
    border-radius: 100px;
    color: var(--text-secondary);
    font-size: 13px;
    cursor: pointer;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .hud-btn:hover {
    border-color: rgba(0,234,255,0.3);
    color: var(--accent-cyan);
    background: rgba(0, 234, 255, 0.05);
    transform: translateY(-2px);
  }

  .hud-btn:active {
    transform: translateY(0) scale(0.96);
  }

  /* ============ 缩放指示器 ============ */
  .zoom-indicator {
    position: absolute;
    bottom: 24px; right: 24px;
    z-index: 20;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    padding: 8px 14px;
    background: rgba(15, 22, 40, 0.6);
    border: 1px solid var(--glass-border);
    border-radius: 100px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    transition: color 0.3s ease;
  }

  /* ============ Hero 大标题 ============ */
  .hero-title-wrap {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 3;
    text-align: center;
    pointer-events: none;
    width: 100%;
  }

  .hero-title {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(80px, 14vw, 200px);
    font-weight: 900;
    letter-spacing: 8px;
    line-height: 1;
    background: linear-gradient(135deg, #00eaff 0%, #a855f7 40%, #ffb84d 70%, #f472b6 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 40px rgba(0, 234, 255, 0.3)) drop-shadow(0 0 80px rgba(168, 85, 247, 0.2));
    opacity: 0.15;
    animation: heroBreath 6s ease-in-out infinite;
  }

  .hero-subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(14px, 1.8vw, 22px);
    letter-spacing: 6px;
    color: var(--text-muted);
    margin-top: 12px;
    opacity: 0.12;
    text-transform: uppercase;
  }

  @keyframes heroBreath {
    0%, 100% { opacity: 0.12; filter: drop-shadow(0 0 40px rgba(0,234,255,0.3)) drop-shadow(0 0 80px rgba(168,85,247,0.2)); }
    50% { opacity: 0.2; filter: drop-shadow(0 0 60px rgba(0,234,255,0.4)) drop-shadow(0 0 100px rgba(168,85,247,0.3)); }
  }

  /* ============ 内容翻页区域 ============ */
  .content-sections {
    position: relative;
    z-index: 10;
    background: transparent;
  }

  .content-section {
    min-height: 100vh;
    padding: 120px 10% 100px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
  }

  .section-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    letter-spacing: 4px;
    margin-bottom: 24px;
    opacity: 0.8;
    text-transform: uppercase;
  }

  .section-title {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(44px, 6vw, 76px);
    font-weight: 900;
    margin-bottom: 32px;
    line-height: 1.1;
    letter-spacing: 2px;

// ============================================================
//  弹簧物理引擎 — 统一驱动所有动画
// ============================================================
class Spring {
  constructor(stiffness = 0.08, damping = 0.75) {
    this.stiffness = stiffness;
    this.damping = damping;
    this.value = 0;
    this.velocity = 0;
    this.target = 0;
  }
  setTarget(t) { this.target = t; }
  setValue(v) { this.value = v; this.target = v; this.velocity = 0; }
  update() {
    const force = (this.target - this.value) * this.stiffness;
    this.velocity += force;
    this.velocity *= this.damping;
    this.value += this.velocity;
    return Math.abs(this.value - this.target) > 0.01 || Math.abs(this.velocity) > 0.01;
  }
}

class Vec2Spring {
  constructor(stiffness = 0.08, damping = 0.75) {
    this.sx = new Spring(stiffness, damping);
    this.sy = new Spring(stiffness, damping);
  }
  setTarget(x, y) { this.sx.setTarget(x); this.sy.setTarget(y); }
  setValue(x, y) { this.sx.setValue(x); this.sy.setValue(y); }
  get x() { return this.sx.value; }
  get y() { return this.sy.value; }
  get vx() { return this.sx.velocity; }
  get vy() { return this.sy.velocity; }
  update() { return this.sx.update() || this.sy.update(); }
}

  const baseAngle = (i / 8) * Math.PI * 2 - Math.PI / 2;
  const angleJitter = (Math.random() - 0.5) * 0.3;
  const angle = baseAngle + angleJitter;

  node.y = Math.sin(angle) * dist;
});

// ============================================================
//  节点 DOM 构建 & 物理状态
// ============================================================
const nodePhysics = {}; // 每个节点的物理状态

function createNode(key) {
  const node = nodeData[key];
  const el = document.createElement('div');
  el.className = `graph-node ${node.type}`;
  el.dataset.id = key;
  el.style.setProperty('--node-gradient', node.gradient);
  el.style.setProperty('--node-glow', node.glow);
  el.style.setProperty('--node-color', `rgb(${node.color.r},${node.color.g},${node.color.b})`);

  // 多层脉冲环
  let pulseHTML = '';
  for (let i = 0; i < 3; i++) {
    pulseHTML += `<div class="node-pulse"></div>`;
  }

  el.innerHTML = `
    ${pulseHTML}
    <div class="node-core">
      <div class="node-label">${node.label}</div>
      ${node.sublabel ? `<div class="node-sublabel">${node.sublabel}</div>` : ''}
    </div>
  `;

  el.addEventListener('click', (e) => {
    e.stopPropagation();
    selectNode(key);
  });

  // 根据angle和distance计算坐标（如果没有x/y）
  const nodeX = (node.x !== undefined) ? node.x : Math.cos((node.angle || 0) * Math.PI / 180) * (node.distance || 280);
  const nodeY = (node.y !== undefined) ? node.y : Math.sin((node.angle || 0) * Math.PI / 180) * (node.distance || 280);

  // 初始化物理状态
  nodePhysics[key] = {
    el: el,
    springX: new Spring(0.04, 0.65),
    springY: new Spring(0.04, 0.65),
    springS: new Spring(0.06, 0.7),   // hover缩放弹簧
    springGlow: new Spring(0.05, 0.7), // 光晕强度
    baseX: nodeX,
    baseY: nodeY,
    offsetX: 0,  // 磁吸偏移
    offsetY: 0,
    targetOffsetX: 0,
    targetOffsetY: 0,
    isHovered: false,
    isActive: false,
    appearProgress: 0,  // 入场进度 0->1
    appearDelay: key === 'center' ? 0 : branchKeys.indexOf(key) * 80 + 200,
    floatPhase: node.floatPhase || 0,
    floatAmp: node.floatAmp || 18,
    floatAmpY: node.floatAmpY || 14,
    coreEl: el.querySelector('.node-core'),
  };

  // 设置初始位置（屏幕外）
  nodePhysics[key].springX.setValue(node.x + (Math.random() - 0.5) * 800);
  nodePhysics[key].springY.setValue(node.y + (Math.random() - 0.5) * 800);

  world.appendChild(el);
  return el;
}

Object.keys(nodeData).forEach(key => createNode(key));

const decoColors = [
  { r: 0, g: 234, b: 255 },
  { r: 168, g: 85, b: 247 },
  { r: 255, g: 184, b: 77 },
  { r: 52, g: 211, b: 153 },

];
const decoCount = 100;
const decoNodes = [];

for (let i = 0; i < decoCount; i++) {
  const angle = Math.random() * Math.PI * 2;
  const dist = 80 + Math.random() * 550;
  const color = decoColors[Math.floor(Math.random() * decoColors.length)];
  const key = 'deco_' + i;
  const dx = Math.cos(angle) * dist;
  const dy = Math.sin(angle) * dist;
  // 大小不一：大部分小，少数中等，极少大
  const sizeRand = Math.random();
  let decoSize;
  if (sizeRand < 0.5) decoSize = 6 + Math.random() * 5;       // 6-11px 小
  else if (sizeRand < 0.85) decoSize = 11 + Math.random() * 8; // 11-19px 中
  else decoSize = 19 + Math.random() * 12;                     // 19-31px 大

  const el = document.createElement('div');
  el.className = 'graph-node deco';
  el.dataset.id = key;
  el.style.setProperty('--node-color', `rgb(${color.r},${color.g},${color.b})`);
  el.style.setProperty('--deco-size', decoSize + 'px');

  el.innerHTML = `<div class="node-core"></div>`;
  world.appendChild(el);

  decoNodes.push({
    key: key,
    el: el,
    baseX: dx,
    baseY: dy,
    x: dx,
    y: dy,
    vx: 0,
    vy: 0,
    color: color,
    size: decoSize,
    floatPhase: Math.random() * Math.PI * 2,
    floatAmp: 15 + Math.random() * 20,
    floatSpeedX: 0.3 + Math.random() * 0.4,
    floatSpeedY: 0.2 + Math.random() * 0.4,
    radius: 4,
  });

  nodePhysics[key] = {
    el: el,
    springX: new Spring(0.03, 0.6),
    springY: new Spring(0.03, 0.6),
    springS: new Spring(0.06, 0.7),
    springGlow: new Spring(0.05, 0.7),
    baseX: dx,
    baseY: dy,
    offsetX: 0,
    offsetY: 0,
    targetOffsetX: 0,
    targetOffsetY: 0,
    isHovered: false,
    isActive: false,
    appearProgress: 0,
    appearDelay: 600 + i * 25,
    floatPhase: Math.random() * Math.PI * 2,
    floatAmp: 15 + Math.random() * 20,
    floatAmpY: 12 + Math.random() * 15,
    coreEl: el.querySelector('.node-core'),
    isDeco: true,
    decoData: decoNodes[i],
  };

  nodePhysics[key].springX.setValue(dx + (Math.random() - 0.5) * 400);
  nodePhysics[key].springY.setValue(dy + (Math.random() - 0.5) * 400);
}

function spawnEdgeRipple(fromKey, toKey) {
  edgeRipples.push({
    from: fromKey,
    to: toKey,
    t: 0,
    speed: 0.008 + Math.random() * 0.006,
    size: 3 + Math.random() * 4,
  });
}

// 定时产生波纹 — 在各种节点间随机传播
setInterval(() => {
  if (edgeRipples.length < 30) {
    // 50%概率中心→分支，50%概率随机节点间
    if (Math.random() < 0.5) {
      const idx = Math.floor(Math.random() * branchKeys.length);
      spawnEdgeRipple('center', branchKeys[idx]);
    } else {
      // 随机选两个距离较近的节点
      const keys = allNodeKeys.filter(k => nodePhysics[k] && nodePhysics[k].appearProgress >= 1);
      if (keys.length >= 2) {
        const k1 = keys[Math.floor(Math.random() * keys.length)];
        const k2 = keys[Math.floor(Math.random() * keys.length)];
        if (k1 !== k2) spawnEdgeRipple(k1, k2);
      }
    }
  }
}, 250);

function drawEdges() {
  gctx.clearRect(0, 0, gw, gh);
  globalTime += 0.016;

  const cx = gw / 2 + viewSpring.x;
  const cy = gh / 2 + viewSpring.y;
  const s = scaleSpring.value;

  // 收集所有节点的屏幕坐标
  const positions = {};
  allNodeKeys.forEach(key => {
    const np = nodePhysics[key];
    if (!np) return;
    positions[key] = {
      x: cx + (np.springX.value + np.offsetX) * s,
      y: cy + (np.springY.value + np.offsetY) * s,
      np: np,
    };
  });

  // ===== 第一层：主节点到中心的细连线（弱化） =====
  branchKeys.forEach((key, i) => {
    const np = nodePhysics[key];
    const node = nodeData[key];
    if (!np || !positions[key]) return;

    const nx = positions[key].x;
    const ny = positions[key].y;

    const midX = (cx + nx) / 2;
    const midY = (cy + ny) / 2;
    const perpX = -(ny - cy) * 0.08;
    const perpY = (nx - cx) * 0.08;
    const cpX = midX + perpX;
    const cpY = midY + perpY;

    // 细连线 — 低透明度
    const grad = gctx.createLinearGradient(cx, cy, nx, ny);
    grad.addColorStop(0, `rgba(0,234,255,${0.04 + Math.sin(globalTime + i) * 0.01})`);
    grad.addColorStop(1, `rgba(${node.color.r},${node.color.g},${node.color.b},0.06)`);

    gctx.strokeStyle = grad;
    gctx.lineWidth = 0.8;
    gctx.beginPath();
    gctx.moveTo(cx, cy);
    gctx.quadraticCurveTo(cpX, cpY, nx, ny);
    gctx.stroke();

    // 流动粒子（减少到2个，更克制）
    const flowCount = 2;
    for (let f = 0; f < flowCount; f++) {
      const t = ((globalTime * 0.2 + f / flowCount + i * 0.12) % 1);
      const t2 = t * t;
      const mt = 1 - t;
      const mt2 = mt * mt;
      const px = mt2 * cx + 2 * mt * t * cpX + t2 * nx;
      const py = mt2 * cy + 2 * mt * t * cpY + t2 * ny;

      const fadeOpacity = Math.sin(t * Math.PI) * 0.5;
      const pSize = 1.5 + fadeOpacity * 2;

      const glow = gctx.createRadialGradient(px, py, 0, px, py, pSize * 3);
      glow.addColorStop(0, `rgba(${node.color.r},${node.color.g},${node.color.b},${fadeOpacity * 0.4})`);
      glow.addColorStop(1, `rgba(${node.color.r},${node.color.g},${node.color.b},0)`);
      gctx.fillStyle = glow;
      gctx.beginPath();
      gctx.arc(px, py, pSize * 3, 0, Math.PI * 2);
      gctx.fill();

      gctx.fillStyle = `rgba(255,255,255,${fadeOpacity * 0.7})`;
      gctx.beginPath();
      gctx.arc(px, py, pSize * 0.5, 0, Math.PI * 2);
      gctx.fill();
    }
  });

  // ===== 第二层：所有节点间的密集网状连线（千丝万缕 — 核心） =====
  const linkThreshold = 220 * s; // 增大连线范围
  const allKeys = Object.keys(positions);

  for (let i = 0; i < allKeys.length; i++) {
    const k1 = allKeys[i];
    const p1 = positions[k1];
    const np1 = p1.np;
    const c1 = np1.isDeco ? np1.decoData.color : nodeData[k1].color;

    for (let j = i + 1; j < allKeys.length; j++) {
      const k2 = allKeys[j];
      const p2 = positions[k2];
      const np2 = p2.np;

      const dx = p1.x - p2.x;
      const dy = p1.y - p2.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < linkThreshold) {
        const ratio = 1 - dist / linkThreshold;
        const c2 = np2.isDeco ? np2.decoData.color : nodeData[k2].color;

        // 非常明显的连线
        let alpha = ratio * 0.6 + 0.1;
        let lineWidth = 1.0 + ratio * 1.5;

        // 呼吸闪烁
        alpha *= 0.75 + Math.sin(globalTime * 1.2 + i * 0.3 + j * 0.5) * 0.25;

        const grad = gctx.createLinearGradient(p1.x, p1.y, p2.x, p2.y);
        grad.addColorStop(0, `rgba(${c1.r},${c1.g},${c1.b},${alpha})`);
        grad.addColorStop(1, `rgba(${c2.r},${c2.g},${c2.b},${alpha})`);
        gctx.strokeStyle = grad;
        gctx.lineWidth = lineWidth;
        gctx.beginPath();
        gctx.moveTo(p1.x, p1.y);
        gctx.lineTo(p2.x, p2.y);
        gctx.stroke();
      }
    }
  }

  // ===== 第三层：脉冲波纹沿连线传播 =====
  edgeRipples = edgeRipples.filter(ripple => {
    ripple.t += ripple.speed;
    if (ripple.t > 1) return false;

    const fromNP = nodePhysics[ripple.from];
    const toNP = nodePhysics[ripple.to];
    if (!fromNP || !toNP || !positions[ripple.from] || !positions[ripple.to]) return false;

    const fx = positions[ripple.from].x;
    const fy = positions[ripple.from].y;
    const tx = positions[ripple.to].x;
    const ty = positions[ripple.to].y;

    const mx = (fx + tx) / 2 - (ty - fy) * 0.1;
    const my = (fy + ty) / 2 + (tx - fx) * 0.1;

    const rt = ripple.t;
    const rt2 = rt * rt;
    const mrt = 1 - rt;
    const mrt2 = mrt * mrt;
    const rx = mrt2 * fx + 2 * mrt * rt * mx + rt2 * tx;
    const ry = mrt2 * fy + 2 * mrt * rt * my + rt2 * ty;

    const alpha = Math.sin(rt * Math.PI) * 0.4;
    const rSize = ripple.size * (0.5 + rt);

    const rGlow = gctx.createRadialGradient(rx, ry, 0, rx, ry, rSize * 6);
    const tc = toNP.isDeco ? toNP.decoData.color : (nodeData[ripple.to] ? nodeData[ripple.to].color : { r: 0, g: 234, b: 255 });
    rGlow.addColorStop(0, `rgba(${tc.r},${tc.g},${tc.b},${alpha})`);
    rGlow.addColorStop(1, `rgba(${tc.r},${tc.g},${tc.b},0)`);
    gctx.fillStyle = rGlow;
    gctx.beginPath();
    gctx.arc(rx, ry, rSize * 6, 0, Math.PI * 2);
    gctx.fill();

    return true;
  });

  requestAnimationFrame(drawEdges);
}
drawEdges();

// ============================================================
//  鼠标追踪 & 节点磁吸效果
// ============================================================
let mouse = { x: -9999, y: -9999 };
const MAGNET_RADIUS = 140;
const MAGNET_STRENGTH = 0.35;

document.addEventListener('mousemove', (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

// ============================================================
//  主渲染循环 — 统一驱动所有物理
// ============================================================
let startTime = performance.now();

function mainLoop(timestamp) {
  const elapsed = timestamp - startTime;
  const t = elapsed * 0.001;

  // 更新视图弹簧
  const viewActive = viewSpring.update();
  const scaleActive = scaleSpring.update();
  if (viewActive || scaleActive) updateViewTransform();

  // 更新每个节点
  Object.keys(nodePhysics).forEach(key => {
    const np = nodePhysics[key];

    // 入场动画
    if (elapsed < np.appearDelay) return;
    if (np.appearProgress < 1) {
      np.appearProgress = Math.min(1, (elapsed - np.appearDelay) / 800);
      const ep = np.appearProgress;
      const elasticEase = ep === 1 ? 1 : 1 - Math.pow(2, -10 * ep) * Math.cos(ep * Math.PI * 3);
      np.el.style.opacity = elasticEase;
    } else {
      np.el.style.opacity = '1';
    }

    // 浮动呼吸 — 多频率叠加更有机
    const floatX = Math.sin(t * 0.8 + np.floatPhase) * np.floatAmp
                 + Math.sin(t * 0.37 + np.floatPhase * 2.1) * np.floatAmp * 0.3;
    const floatY = Math.cos(t * 0.6 + np.floatPhase * 1.3) * np.floatAmpY
                 + Math.cos(t * 0.29 + np.floatPhase * 0.7) * np.floatAmpY * 0.35;

    // 鼠标全局视差牵引 — 整个图谱跟随鼠标轻微偏移
    const screenCx = gw / 2;
    const screenCy = gh / 2;
    const parallaxStrength = np.isDeco ? 0.04 : 0.025;
    const parallaxX = (mouse.x - screenCx) * parallaxStrength;
    const parallaxY = (mouse.y - screenCy) * parallaxStrength;

    // 目标位置 = 基础位置 + 浮动偏移 + 视差
    const targetX = np.baseX + floatX + parallaxX;
    const targetY = np.baseY + floatY + parallaxY;

    // 磁吸效果（仅主节点）
    if (!np.isDeco) {
      const elRect = np.el.getBoundingClientRect();
      const elCx = elRect.left + elRect.width / 2;
      const elCy = elRect.top + elRect.height / 2;
      const mdx = mouse.x - elCx;
      const mdy = mouse.y - elCy;
      const mDist = Math.sqrt(mdx * mdx + mdy * mdy);

      if (mDist < MAGNET_RADIUS && mDist > 0) {
        const force = (1 - mDist / MAGNET_RADIUS) * MAGNET_STRENGTH;
        np.targetOffsetX = (mdx / mDist) * force * 30;
        np.targetOffsetY = (mdy / mDist) * force * 30;
        np.isHovered = true;
      } else {
        np.targetOffsetX *= 0.85;
        np.targetOffsetY *= 0.85;
        if (Math.abs(np.targetOffsetX) < 0.5) np.targetOffsetX = 0;
        if (Math.abs(np.targetOffsetY) < 0.5) np.targetOffsetY = 0;
        np.isHovered = false;
      }

      // 平滑磁吸偏移
      np.offsetX += (np.targetOffsetX - np.offsetX) * 0.12;
      np.offsetY += (np.targetOffsetY - np.offsetY) * 0.12;
    } else {
      // 装饰节点：鼠标引力场
      const elRect = np.el.getBoundingClientRect();
      const elCx = elRect.left + elRect.width / 2;
      const elCy = elRect.top + elRect.height / 2;
      const mdx = mouse.x - elCx;
      const mdy = mouse.y - elCy;
      const mDist = Math.sqrt(mdx * mdx + mdy * mdy);
      const decoMagnetR = 200;

      if (mDist < decoMagnetR && mDist > 0) {
        const force = (1 - mDist / decoMagnetR) * 0.15;
        np.targetOffsetX = (mdx / mDist) * force * 40;
        np.targetOffsetY = (mdy / mDist) * force * 40;
      } else {
        np.targetOffsetX *= 0.92;
        np.targetOffsetY *= 0.92;
        if (Math.abs(np.targetOffsetX) < 0.3) np.targetOffsetX = 0;
        if (Math.abs(np.targetOffsetY) < 0.3) np.targetOffsetY = 0;
      }
      np.offsetX += (np.targetOffsetX - np.offsetX) * 0.08;
      np.offsetY += (np.targetOffsetY - np.offsetY) * 0.08;
    }

    // 位置弹簧
    np.springX.setTarget(targetX);
    np.springY.setTarget(targetY);
    np.springX.update();
    np.springY.update();

    // 应用变换
    const sx = np.springX.value + np.offsetX;
    const sy = np.springY.value + np.offsetY;
    np.el.style.transform = `translate(calc(-50% + ${sx}px), calc(-50% + ${sy}px))`;

    // 缩放弹簧 (hover / active) — 装饰节点不缩放
    if (!np.isDeco) {
      let targetScale = 1;
      if (np.isActive) targetScale = 1.12;
      else if (np.isHovered) targetScale = 1.08;
      np.springS.setTarget(targetScale);
      np.springS.update();

      let targetGlow = 0;
      if (np.isActive) targetGlow = 1;
      else if (np.isHovered) targetGlow = 0.6;
      np.springGlow.setTarget(targetGlow);
      np.springGlow.update();

      const sc = np.springS.value;
      const gl = np.springGlow.value;
      np.coreEl.style.transform = `scale(${sc})`;
      np.coreEl.style.boxShadow = gl > 0.01 
        ? `0 0 ${40 * gl}px var(--node-glow, rgba(0,234,255,${gl * 0.4}))`
        : 'none';
    }
  });

  // 更新hover/active状态的CSS类
  Object.keys(nodePhysics).forEach(key => {
    const np = nodePhysics[key];
    if (np.isHovered || np.isActive) {
      np.el.classList.add('hovered');
    } else {
      np.el.classList.remove('hovered');
    }
    if (np.isActive) {
      np.el.classList.add('active');
    } else {
      np.el.classList.remove('active');
    }
  });

  requestAnimationFrame(mainLoop);
}

requestAnimationFrame(mainLoop);

// ============================================================
//  背景粒子 — 柔和光晕拖尾 + 引力场
// ============================================================
const pCanvas = document.getElementById('particle-canvas');
const pctx = pCanvas.getContext('2d');
let pw, ph;
let bgParticles = [];

function resizeP() {
  pw = pCanvas.width = window.innerWidth;
  ph = pCanvas.height = window.innerHeight;
  initBgParticles();
}

function initBgParticles() {
  bgParticles = [];
  const count = Math.floor((pw * ph) / 35000);
  const colors = [
    { r: 0, g: 234, b: 255 },
    { r: 168, g: 85, b: 247 },
    { r: 255, g: 184, b: 77 },
    { r: 52, g: 211, b: 153 },
  ];
  for (let i = 0; i < count; i++) {
    const color = colors[Math.floor(Math.random() * colors.length)];
    bgParticles.push({
      x: Math.random() * pw,
      y: Math.random() * ph,
      vx: (Math.random() - 0.5) * 0.15,
      vy: (Math.random() - 0.5) * 0.15,
      radius: Math.random() * 1.8 + 0.4,
      color: color,
      phase: Math.random() * Math.PI * 2,
      trail: [],  // 拖尾历史
      maxTrail: 5 + Math.floor(Math.random() * 4),
    });
  }
}

function animateBg() {
  pctx.clearRect(0, 0, pw, ph);
  const t = performance.now() * 0.001;

  bgParticles.forEach((p, i) => {
    // 基础运动 + 正弦波动
    p.vx += Math.sin(t * 0.6 + p.phase) * 0.003;
    p.vy += Math.cos(t * 0.4 + p.phase * 1.5) * 0.003;

    // 鼠标引力场（柔和吸引）
    const mdx = mouse.x - p.x;
    const mdy = mouse.y - p.y;
    const mDist = Math.sqrt(mdx * mdx + mdy * mdy);
    if (mDist < 150 && mDist > 10) {
      const attractForce = (1 - mDist / 150) * 0.008;
      p.vx += (mdx / mDist) * attractForce;
      p.vy += (mdy / mDist) * attractForce;
    }

    // 速度阻尼
    p.vx *= 0.995;
    p.vy *= 0.995;

    // 更新位置
    p.trail.unshift({ x: p.x, y: p.y });
    if (p.trail.length > p.maxTrail) p.trail.pop();

    p.x += p.vx;
    p.y += p.vy;

    // 边界环绕
    if (p.x < -20) { p.x = pw + 20; p.trail = []; }
    if (p.x > pw + 20) { p.x = -20; p.trail = []; }
    if (p.y < -20) { p.y = ph + 20; p.trail = []; }
    if (p.y > ph + 20) { p.y = -20; p.trail = []; }

    // 绘制拖尾
    for (let ti = 0; ti < p.trail.length; ti++) {
      const tp = p.trail[ti];
      const ratio = 1 - ti / p.trail.length;
      const trailAlpha = ratio * 0.12;
      const trailR = p.radius * ratio * 0.8;
      pctx.fillStyle = `rgba(${p.color.r},${p.color.g},${p.color.b},${trailAlpha})`;
      pctx.beginPath();
      pctx.arc(tp.x, tp.y, trailR, 0, Math.PI * 2);
      pctx.fill();
    }

    // 绘制光晕（柔和扩散）
    const glowSize = p.radius * (2.5 + Math.sin(t * 2 + p.phase) * 0.8);
    const glowAlpha = 0.15 + Math.sin(t * 1.5 + p.phase) * 0.05;
    const glowGrad = pctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, glowSize);
    glowGrad.addColorStop(0, `rgba(${p.color.r},${p.color.g},${p.color.b},${glowAlpha})`);
    glowGrad.addColorStop(1, `rgba(${p.color.r},${p.color.g},${p.color.b},0)`);
    pctx.fillStyle = glowGrad;
    pctx.beginPath();
    pctx.arc(p.x, p.y, glowSize, 0, Math.PI * 2);
    pctx.fill();

    // 核心亮点
    pctx.fillStyle = `rgba(${p.color.r},${p.color.g},${p.color.b},0.45)`;
    pctx.beginPath();
    pctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    pctx.fill();
  });

  // 粒子间连线（更稀疏更柔和）
  for (let i = 0; i < bgParticles.length; i++) {
    const p1 = bgParticles[i];
    for (let j = i + 1; j < bgParticles.length; j++) {
      const p2 = bgParticles[j];
      const ddx = p1.x - p2.x;
      const ddy = p1.y - p2.y;
      const d = Math.sqrt(ddx * ddx + ddy * ddy);
      if (d < 90) {
        const opacity = (1 - d / 90) * 0.04;
        pctx.strokeStyle = `rgba(${p1.color.r},${p1.color.g},${p1.color.b},${opacity})`;
        pctx.lineWidth = 0.3;
        pctx.beginPath();
        pctx.moveTo(p1.x, p1.y);
        pctx.lineTo(p2.x, p2.y);
        pctx.stroke();
      }
    }
  }

  requestAnimationFrame(animateBg);
}

  mouse.y = e.clientY;

function buildContentSections() {

  order.forEach((key, idx) => {
    const node = nodeData[key];
    const c = node.content;
    const colorStr = `rgb(${node.color.r},${node.color.g},${node.color.b})`;
    const num = String(idx + 1).padStart(2, '0');

    let bodyHtml = '';

    // 每个板块用独特布局
    if (key === 'pain') {
      // 递进堆叠式
      bodyHtml = `<div class="layout-escalate">` + c.items.map((item, i) => `
        <div class="esc-item" style="--card-accent:${colorStr};">
          <div class="esc-level">0${i+1}</div>
          <div class="esc-body">
            <div class="esc-title">${item.title}</div>
            <div class="esc-text">${item.desc}</div>

      // 横向流程箭头式
      bodyHtml = `<div class="layout-flow">` + c.items.map((item, i) => `
        <div class="flow-step" style="--card-accent:${colorStr};">

          <div class="flow-title">${item.title}</div>
          <div class="flow-text">${item.desc}</div>

      // 中心辐射式

        <div class="radial-card" style="--card-accent:${colorStr};">
          <div class="radial-tag">FEATURE 0${i+1}</div>

          <div class="radial-text">${item.desc}</div>
          ${item.tags ? `<div class="section-tags" style="margin-top:16px;">${item.tags.map(t => `<span class="section-tag" style="color:${colorStr};border-color:${colorStr}33;background:${colorStr}0d;">${t}</span>`).join('')}</div>` : ''}
        </div>
      `).join('') + `</div>`;
    } else if (key === 'workflow') {
      // 时间线轨道式
      bodyHtml = `<div class="layout-timeline">` + c.timeline.map((item, i) => `

          <div class="tl-body">
            <div class="tl-title">${item.title}</div>
            <div class="tl-text">${item.desc}</div>
          </div>
        </div>
      `).join('') + `</div>`;
    } else if (key === 'tech') {
      // 分层堆叠式
      bodyHtml = `<div class="layout-stack">` + c.tech.map((item, i) => `
        <div class="stack-layer" style="--layer-color:${item.dot};">
          <div class="stack-label">LAYER 0${i+1}</div>
          <div class="stack-name">${item.name}</div>
          <div class="stack-detail">${item.content}</div>
        </div>
      `).join('') + `</div>`;
    } else if (key === 'innovation') {
      // 对比矩阵式
      bodyHtml = `<div class="layout-versus">` + c.items.map((item, i) => `
        <div class="vs-card" style="--card-accent:${colorStr};">
          <div class="vs-icon-text">0${i+1}</div>
          <div class="vs-title">${item.title}</div>
          <div class="vs-text">${item.desc}</div>
        </div>
      `).join('') + `</div>`;
    } else if (key === 'users') {
      // 人物画像式
      bodyHtml = `<div class="layout-persona">` + c.items.map((item, i) => {
        const initials = ['I','II','III','IV'][i] || (i+1);
        return `
        <div class="persona-card" style="--card-accent:${colorStr};">
          <div class="persona-avatar">${initials}</div>
          <div class="persona-body">
            <div class="persona-title">${item.title}</div>
            <div class="persona-text">${item.desc}</div>
          </div>
        </div>`;
      }).join('') + `</div>`;
    } else if (key === 'future') {
      // 阶梯式 + 结尾愿景区
      bodyHtml = `<div class="layout-staircase">` + c.roadmap.map((item, i) => `
        <div class="stair-item" style="--card-accent:${colorStr};">
          <div class="stair-phase">${item.phase}</div>
          <div class="stair-text">${item.desc}</div>
        </div>
      `).join('') + `</div>
      <div class="closing-vision">
        <h3>让每一份文献，都有迹可循</h3>
        <p>知源的终极愿景，是让科研回归"理解"本身。不再翻找、不再遗漏——每一次阅读都能回到知识的源头，看见文献之间的联系，构建属于自己的研究知识宇宙。</p>
        <div class="closing-stats">
          <div class="closing-stat">
            <div class="num">5</div>
            <div class="label">解析格式</div>
          </div>
          <div class="closing-stat">
            <div class="num">4</div>
            <div class="label">匹配策略</div>
          </div>
          <div class="closing-stat">
            <div class="num">6</div>
            <div class="label">功能模块</div>
          </div>
        </div>
        <div class="closing-cta">知源 KnowSource v2.1.0 · Electron + Vue 3</div>
      </div>`;
    }

    html += `
      <section class="content-section" id="section-${key}" style="--section-color:${colorStr};">
        <div class="section-number" style="color:${colorStr};">${num} / ${String(order.length).padStart(2, '0')} · ${c.label}</div>
        <h2 class="section-title">${c.title}<span class="accent" style="background:linear-gradient(135deg,${colorStr},var(--accent-violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">.</span></h2>
        <p class="section-desc">${c.desc}</p>
        ${bodyHtml}
      </section>
    `;
  });

  container.innerHTML = html;
}

buildContentSections();

// hover/active状态驱动伪元素渐变边框
const hoverStyle = document.createElement('style');
hoverStyle.textContent = `
  .graph-node.hovered .node-core::before,
  .graph-node.active .node-core::before { opacity: 1; }
`;
document.head.appendChild(hoverStyle);

</script>
</body>
</html>
