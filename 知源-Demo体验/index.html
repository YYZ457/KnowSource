    const box=$('#ideaCards');if(!state.ideas.length)box.innerHTML='<div class="empty">'+icon('idea')+'<h3>还没有灵感记录</h3><p>点击「新建」开始记录</p></div>';
    state.ideas.forEach(i=>{const c=document.createElement('article');c.className='idea-card'+(state.selectedIdea===i.id?' active':'');c.innerHTML='<h3>'+esc(i.title||'未命名灵感')+'</h3><p>'+esc(i.content||'暂无内容')+'</p><div class="idea-tags">'+(i.includeInGraph?'<span class="tag rose">图谱中</span>':'')+(i.tags||[]).map(t=>'<span class="tag cyan">'+esc(t)+'</span>').join('')+'</div>';c.onclick=()=>{state.selectedIdea=i.id;renderIdeaSidebar();renderIdeas()};box.appendChild(c)});
    $('#newIdea').onclick=()=>{const id='idea-'+Date.now();state.ideas.unshift({id,title:'未命名灵感',content:'',tags:[],nodeId:null,nodeLabel:null,includeInGraph:false});state.selectedIdea=id;renderIdeaSidebar();renderIdeas();setTimeout(()=>$('#ideaTitle')?.select(),0)};
  }
  function renderIdeas(){
    const host=$('#ideaView'),idea=state.ideas.find(i=>i.id===state.selectedIdea);
    host.innerHTML='<div class="panel idea-editor"><div class="panel-head"><h2>'+(idea?'编辑灵感':'灵感编辑器')+'</h2><span class="panel-head-spacer"></span>'+(idea?'<button id="deleteIdea" class="btn btn-sm btn-danger">'+icon('trash')+'删除</button>':'')+'</div><div id="ideaForm" class="panel-body idea-form"></div></div>';
    const form=$('#ideaForm');if(!idea){form.innerHTML='<div class="empty">'+icon('idea')+'<h3>选择一个灵感或新建灵感</h3><p>在此编辑内容并关联知识节点</p></div>';return}
    form.innerHTML='<div class="field"><label>标题</label><input id="ideaTitle" type="text" value="'+esc(idea.title)+'" placeholder="灵感标题"></div><div class="field"><label>内容</label><textarea id="ideaContent" rows="11" placeholder="记录你的灵感、思路与发现...">'+esc(idea.content)+'</textarea></div><div class="field"><label>标签（逗号分隔）</label><input id="ideaTags" type="text" value="'+esc((idea.tags||[]).join(', '))+'" placeholder="知识图谱, 待验证"></div>'+(idea.nodeId?'<div class="linked-node">'+icon('link')+'<span>已关联节点：'+esc(idea.nodeLabel||idea.nodeId)+'</span></div>':'')+'<label class="idea-toggle"><input id="ideaIncludeGraph" type="checkbox" '+(idea.includeInGraph?'checked':'')+'><span><strong>在知识图谱中显示</strong><small>以胶囊节点显示，并自然连接到已关联的知识节点</small></span></label><div class="form-actions"><button id="saveIdea" class="btn btn-primary">保存</button><button id="linkIdea" class="btn">'+icon('link')+'关联节点</button></div>';
    $('#saveIdea').onclick=()=>{idea.title=$('#ideaTitle').value.trim()||'未命名灵感';idea.content=$('#ideaContent').value;idea.tags=$('#ideaTags').value.split(/[,，]/).map(x=>x.trim()).filter(Boolean);idea.includeInGraph=$('#ideaIncludeGraph').checked;if(idea.includeInGraph&&!idea.nodeId){idea.includeInGraph=false;toast('请先关联知识节点，再启用图谱显示','warn')}if(idea.includeInGraph)revealIncludedIdeaTargets();else state.graphPositions.delete(idea.id);renderIdeaSidebar();renderIdeas();toast('灵感已保存','success')};
    $('#linkIdea').onclick=()=>openLinkDialog(idea);$('#deleteIdea').onclick=()=>showConfirm('删除灵感','确定删除「'+idea.title+'」吗？',()=>{state.ideas=state.ideas.filter(i=>i.id!==idea.id);state.graphPositions.delete(idea.id);if(state.selectedNode===idea.id)state.selectedNode=null;state.selectedIdea=state.ideas[0]?.id||null;renderIdeaSidebar();renderIdeas();toast('灵感已删除','success')},'删除');
  }
  function openLinkDialog(idea){
    const host=$('#dialogOverlay');host.className='overlay';host.innerHTML='<div class="dialog"><div class="dialog-head"><h3>关联知识节点</h3><button class="icon-btn" data-x>'+icon('close')+'</button></div><div class="dialog-body"><input id="linkSearch" type="search" placeholder="搜索节点..."><div id="nodeOptions" class="node-options"></div></div><div class="dialog-foot"><button class="btn btn-sm" data-cancel>取消</button><button class="btn btn-sm btn-primary" data-save>关联</button></div></div>';
    let selected=idea.nodeId;const render=q=>{const opts=state.nodes.filter(n=>n.type!=='document'&&(!q||(n.label||'').toLowerCase().includes(q.toLowerCase()))).slice(0,35);$('#nodeOptions').innerHTML=opts.map(n=>'<button class="node-option '+(selected===n.id?'active':'')+'" data-id="'+esc(n.id)+'"><span class="tree-dot" style="background:'+nodeColor(n)+'"></span><span>'+esc(n.label||n.id)+'</span></button>').join('');$$('.node-option').forEach(b=>b.onclick=()=>{selected=b.dataset.id;render($('#linkSearch').value)})};render('');$('#linkSearch').oninput=e=>render(e.target.value);host.querySelector('[data-x]').onclick=host.querySelector('[data-cancel]').onclick=closeDialog;host.querySelector('[data-save]').onclick=()=>{if(!selected){toast('请选择一个节点','warn');return}idea.nodeId=selected;idea.nodeLabel=nodeById(selected)?.label||selected;state.graphPositions.delete(idea.id);if(idea.includeInGraph)revealIncludedIdeaTargets();closeDialog();renderIdeas();renderIdeaSidebar();toast('已关联知识节点；启用“在知识图谱中显示”后会生成胶囊节点','success')};$('#linkSearch').focus();
  }
  function openSettings(tab=state.settingsTab){
    state.settingsTab=tab;const host=$('#settingsOverlay');host.className='overlay';host.innerHTML='<div class="settings-modal" role="dialog" aria-modal="true"><header class="settings-head"><h2>'+icon('settings')+'设置</h2><button id="closeSettings" class="icon-btn">'+icon('close')+'</button></header><div class="settings-body"><nav class="settings-nav"><button class="settings-tab" data-tab="model">'+icon('settings')+'模型配置</button><button class="settings-tab" data-tab="prompts">'+icon('doc')+'提示词模板<span class="count">16</span></button><button class="settings-tab" data-tab="about">ⓘ 关于</button></nav><div class="settings-content"><section id="settingsModel" class="settings-page"></section><section id="settingsPrompts" class="settings-page"></section><section id="settingsAbout" class="settings-page"></section></div></div></div>';
    $('#closeSettings').onclick=closeSettings;host.onclick=e=>{if(e.target===host)closeSettings()};$$('.settings-tab').forEach(b=>b.onclick=()=>{state.settingsTab=b.dataset.tab;renderSettingsPage()});renderSettingsPage();
  }
  function closeSettings(){const h=$('#settingsOverlay');h.className='hidden';h.innerHTML=''}
  function renderSettingsPage(){
    $$('.settings-tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===state.settingsTab));$$('.settings-page').forEach(p=>p.classList.remove('active'));
    if(state.settingsTab==='model')renderModelSettings();else if(state.settingsTab==='prompts')renderPromptSettings();else renderAbout();
  }
  function renderModelSettings(){
    const p=$('#settingsModel');p.classList.add('active');p.innerHTML='<div class="settings-card"><div class="settings-card-head"><h3>模型配置</h3><span class="tag violet">体验模式</span></div><div class="settings-card-body"><div class="field"><label>服务商 Provider</label><select id="provider"><option value="stub">Stub（本地模拟）</option><option value="openai">OpenAI 兼容</option><option value="ollama">Ollama 本地模型</option></select><div class="hint">体验窗口固定载入人工校准图谱，不会发送 API 请求。</div></div><div class="field-row"><div class="field"><label>模型名称 Model</label><input id="modelName" type="text" placeholder="例如 gpt-4o-mini"></div><div class="field"><label>API Key</label><input id="apiKey" type="password" placeholder="体验模式无需 API Key"></div></div><div class="field"><label>Base URL</label><input id="baseUrl" type="text" placeholder="https://api.openai.com/v1"><div class="hint">真实桌面端支持 OpenAI 兼容接口与本地 Ollama。</div></div><div class="form-actions"><button id="testModel" class="btn btn-primary">测试连接</button><button id="saveModel" class="btn">保存配置</button></div><div id="modelResult"></div></div></div>';
    const cfg=state.modelConfig;$('#provider').value=cfg.provider;$('#modelName').value=cfg.modelName;$('#apiKey').value=cfg.apiKey;$('#baseUrl').value=cfg.baseUrl;
    $('#testModel').onclick=()=>{const r=$('#modelResult');r.innerHTML='<div class="linked-node" style="margin-top:12px">'+icon('bolt')+'人工校准图谱已就绪。体验窗口未发起真实模型请求。</div>';toast('体验模式校验通过','success')};
    $('#saveModel').onclick=()=>{state.modelConfig={provider:$('#provider').value,modelName:$('#modelName').value.trim(),apiKey:$('#apiKey').value,baseUrl:$('#baseUrl').value.trim()};toast('配置已保存到当前体验会话','success')};
  }
  function renderPromptSettings(){
    const p=$('#settingsPrompts');p.classList.add('active');const task=PROMPTS.find(x=>x.id===state.promptId)||PROMPTS[0],draft=state.promptDraft[task.id]||{sys:task.sys,user:task.user};
    p.innerHTML='<div class="prompt-grid"><aside class="prompt-list"><div class="prompt-list-head"><h3>LLM 任务</h3><span class="count">16</span></div><div class="prompt-tasks">'+PROMPTS.map(t=>'<button class="prompt-task '+(t.id===task.id?'active':'')+'" data-prompt="'+t.id+'"><strong>'+esc(t.name)+'</strong><small>'+esc(t.desc)+'</small></button>').join('')+'</div></aside><div class="prompt-editor"><div class="settings-card"><div class="settings-card-head"><h3>'+esc(task.name)+'</h3><span class="tag amber">预览编辑</span></div><div class="settings-card-body"><div class="field"><label>System Prompt（系统提示词）</label><textarea id="promptSys">'+esc(draft.sys)+'</textarea></div><div class="field"><label>User Prompt（用户提示词）</label><textarea id="promptUser">'+esc(draft.user)+'</textarea></div><div class="vars"><span>检测到的变量：</span>'+Array.from((draft.sys+' '+draft.user).matchAll(/{{(.*?)}}/g),m=>m[1]).map(v=>'<span class="tag violet">{{'+esc(v)+'}}</span>').join('')+'</div><div class="form-actions"><button id="savePrompt" class="btn btn-primary">保存模板</button><button id="testPrompt" class="btn">测试运行</button></div><div id="promptResult"></div></div></div></div></div>';
    $$('.prompt-task').forEach(b=>b.onclick=()=>{state.promptDraft[task.id]={sys:$('#promptSys').value,user:$('#promptUser').value};state.promptId=b.dataset.prompt;renderPromptSettings()});
    $('#savePrompt').onclick=()=>{state.promptDraft[task.id]={sys:$('#promptSys').value,user:$('#promptUser').value};toast('模板已保存到当前体验会话','success')};
    $('#testPrompt').onclick=()=>{$('#promptResult').innerHTML='<div class="linked-node" style="margin-top:12px">'+icon('bolt')+'模板渲染完成；体验窗口不会调用真实模型。</div>'};
  }
  function renderAbout(){
    const p=$('#settingsAbout');p.classList.add('active');p.innerHTML='<div class="about"><svg class="about-logo" viewBox="0 0 24 24" fill="none"><path d="M12 2 2 7v10l10 5 10-5V7z" stroke="url(#about-grad)" stroke-width="2"/><circle cx="12" cy="12" r="3" fill="url(#about-grad)"/><defs><linearGradient id="about-grad"><stop stop-color="#06b6d4"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs></svg><h2>知源 KnowSource</h2><div class="about-version">v2.3.0 · CURATED GRAPH DEMO</div><p class="about-desc">科研知识工作台 — 多文献阅读、知识网络构建与灵感记录</p><div class="feature-list"><div class="feature">'+icon('doc')+'多格式文献导入与阅读</div><div class="feature">'+icon('graph')+'知识图谱构建与探索</div><div class="feature">'+icon('idea')+'灵感记录与知识关联</div></div><button id="aboutReset" class="btn btn-sm">'+icon('reset')+'重置体验数据</button></div>';$('#aboutReset').onclick=()=>{closeSettings();confirmReset()};
  }
  function searchAll(q){
    const panel=$('#searchPanel');if(!q.trim()){panel.innerHTML='<div class="search-empty">输入文献、节点或灵感关键词</div>';panel.classList.remove('hidden');return}
    const query=q.trim().toLowerCase(),docs=state.docs.filter(d=>d.name.toLowerCase().includes(query)).slice(0,5),texts=TEXT_RESULTS.filter(x=>(x.title+' '+x.snippet+' '+x.docName).toLowerCase().includes(query)).slice(0,5),nodes=state.nodes.filter(n=>(n.label||'').toLowerCase().includes(query)).slice(0,8),ideas=state.ideas.filter(i=>(i.title+' '+i.content+' '+i.tags.join(' ')).toLowerCase().includes(query)).slice(0,5);
    const group=(name,items,kind)=>items.length?'<div class="search-group-title">'+name+'</div>'+items.map(x=>{const page=(kind==='node'||kind==='text')&&Number.isFinite(Number(x.page))&&Number(x.page)>0?' · 第 '+Number(x.page)+' 页':'';const meta=kind==='doc'?'文献':kind==='text'?'原文片段 · '+esc(x.docName)+page:kind==='node'?'知识节点 · '+esc(x.docName||'手动节点')+page:'灵感记录';const snippet=kind==='text'?'<span class="search-result-snippet">'+esc(x.snippet)+'</span>':'';return '<button class="search-result" data-kind="'+kind+'" data-id="'+esc(x.id)+'"><span class="search-result-icon">'+icon(kind==='doc'||kind==='text'?'doc':kind==='node'?'graph':'idea')+'</span><span class="search-result-main"><span class="search-result-title">'+esc(x.name||x.label||x.title)+'</span><span class="search-result-meta">'+meta+'</span>'+snippet+'</span></button>'}).join(''):'';
    panel.innerHTML='<div class="search-head">搜索 “'+esc(q)+'”</div><div class="search-results">'+group('文献',docs,'doc')+group('原文片段',texts,'text')+group('知识节点',nodes,'node')+group('灵感',ideas,'idea')+(!docs.length&&!texts.length&&!nodes.length&&!ideas.length?'<div class="search-empty">没有匹配结果</div>':'')+'</div>';panel.classList.remove('hidden');
    $$('.search-result').forEach(b=>b.onclick=()=>{if(b.dataset.kind==='doc'){state.selectedDoc=b.dataset.id;state.docPage=1;setView('documents')}else if(b.dataset.kind==='text'){const result=TEXT_RESULTS.find(x=>x.id===b.dataset.id);state.selectedDoc=result.docId;state.docPage=Math.max(1,Number(result.page)||1);state.docMode='render';setView('documents');toast('已打开来源文献第 '+state.docPage+' 页','success')}else if(b.dataset.kind==='node'){const n=nodeById(b.dataset.id);state.selectedNode=n.id;state.visible.add(rootId(n.docId));state.visible.add(n.id);setView('graph')}else{state.selectedIdea=b.dataset.id;setView('idea')}panel.classList.add('hidden')});
  }
  function confirmReset(){showConfirm('重置产品体验','恢复三份样例文献、人工校准图谱、灵感与默认主题？',resetAll,'重置')}
  function resetAll(){
    state.docs=SAMPLE_DOCS.map(x=>({...x}));state.selectedDoc='doc-b2613a49';state.docPage=1;state.docMode='render';state.nodes=BASE_GRAPH.nodes.filter(x=>x.type!=='idea').map(x=>({...x}));state.edges=BASE_GRAPH.edges.filter(x=>x.type!=='idea-link').map(x=>({...x}));
    state.project='all';state.selectedDocs=new Set(SAMPLE_DOCS.map(x=>x.id));state.visible=new Set(SAMPLE_DOCS.map(d=>rootId(d.id)));revealIncludedIdeaTargets();state.expanded.clear();state.graphPositions.clear();clearTimeout(state.nodeClickTimer);state.nodeClickTimer=null;state.selectedNode=null;state.sourcePreview=null;state.ideas=initialIdeas();state.selectedIdea='idea-8175e8dc';state.pdfVariant={};state.promptDraft={};state.modelConfig={provider:'stub',modelName:'',apiKey:'',baseUrl:''};state.treeClosed.clear();setView('documents');toast('产品体验已重置','success');
  }
  $$('.nav-btn').forEach(b=>b.onclick=()=>setView(b.dataset.view));
  $('#settingsBtn').onclick=()=>openSettings();$('#resetBtn').onclick=confirmReset;
  $('#themeBtn').onclick=()=>{state.theme=state.theme==='dark'?'light':'dark';$('#app').dataset.theme=state.theme;if(state.view==='graph')renderGraph();toast(state.theme==='dark'?'已切换暗色主题':'已切换亮色主题','success')};
  $('#globalSearch').onfocus=e=>searchAll(e.target.value);$('#globalSearch').oninput=e=>searchAll(e.target.value);
  $('#fileInput').onchange=e=>{if(e.target.files.length)handleFiles(e.target.files);e.target.value=''};
  document.addEventListener('pointerdown',e=>{if(!e.target.closest('.search-wrap')&&!e.target.closest('#searchPanel'))$('#searchPanel').classList.add('hidden');if(!e.target.closest('#contextMenu'))$('#contextMenu').classList.add('hidden')});
  document.addEventListener('keydown',e=>{
    const mod=e.ctrlKey||e.metaKey;
    if(mod&&e.key.toLowerCase()==='k'){e.preventDefault();$('#globalSearch').focus();searchAll($('#globalSearch').value)}
    else if(mod&&['1','2','3'].includes(e.key)){e.preventDefault();setView({1:'documents',2:'graph',3:'idea'}[e.key])}
    else if(e.key==='Escape'){if(!$('#dialogOverlay').classList.contains('hidden'))closeDialog();else if(!$('#settingsOverlay').classList.contains('hidden'))closeSettings();else{$('#searchPanel').classList.add('hidden');$('#globalSearch').blur()}$('#contextMenu').classList.add('hidden')}
  });
  let resizeStart=null;$('#splitter').onpointerdown=e=>{resizeStart={x:e.clientX,w:$('#sidebar').getBoundingClientRect().width};e.target.setPointerCapture(e.pointerId)};
  $('#splitter').onpointermove=e=>{if(!resizeStart)return;const total=$('.main-content').clientWidth,next=Math.max(190,Math.min(total*.45,resizeStart.w+e.clientX-resizeStart.x));$('.main-content').style.gridTemplateColumns=next+'px 3px minmax(0,1fr)';if(state.view==='graph')renderGraph()};
  $('#splitter').onpointerup=()=>resizeStart=null;window.addEventListener('resize',()=>{if(state.view==='graph')renderGraph()});
  setView('documents');setTimeout(()=>toast('已载入三篇真实文献与人工校准图谱；体验窗不会调用模型','success'),450);
  window.__KS_DEMO_READY__=true;
  if(window.parent!==window)window.parent.postMessage({type:'knowsource-demo-ready'},'*');
})();
</script>
